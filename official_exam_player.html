<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official IGCSE Exam Module</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Unifying Navbar Style */
        .navbar {
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border-bottom: 1px solid #eee;
            z-index: 100;
        }
        .nav-links a {
            text-decoration: none;
            color: #1e3c72;
            font-weight: 600;
            margin-left: 20px;
            font-size: 0.9em;
        }
        
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 5px;
            background: #ddd;
        }

        /* Left Side: Answer Panel */
        .answer-panel {
            flex: 1;
            background: white;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }

        /* Right Side: Question Paper */
        .paper-panel {
            flex: 1.2;
            background: #525659;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .paper-page {
            background: white;
            box-shadow: 0 5px 25px rgba(0,0,0,0.5);
            max-width: 100%;
            display: block;
        }

        /* Floating Extracts Booklet */
        .extracts-modal {
            display: none;
            position: fixed;
            top: 10%; left: 10%; width: 80%; height: 80%;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            border-radius: 15px;
            overflow: hidden;
            flex-direction: column;
        }
        .extracts-header {
            padding: 15px 25px;
            background: #1e3c72;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .extracts-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* UI Elements */
        .sub-question-item {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            transition: all 0.3s;
        }
        .sub-question-item:focus-within {
            border-color: #1e3c72;
            box-shadow: 0 5px 15px rgba(30, 60, 114, 0.1);
        }
        .sub-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        .mark-badge {
            background: #e1e7ff;
            color: #1e3c72;
            padding: 2px 10px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 0.85em;
        }
        
        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 1.05em;
            resize: vertical;
            outline: none;
            font-family: inherit;
        }
        textarea:focus { border-color: #1e3c72; }

        .control-btn {
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .btn-prev { background: #f1f3f5; color: #1e3c72; }
        .btn-next { background: #1e3c72; color: white; }
        .btn-grade {
            background: #28a745;
            color: white;
            margin-top: 15px;
            width: 100%;
        }
        
        .feedback-zone {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: #f8f9fa;
            border-left: 5px solid #1e3c72;
            display: none;
        }
        .feedback-zone.show { display: block; }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="navbar">
        <div style="font-weight: 800; color: #1e3c72; font-size: 1.1em; display: flex; align-items: center; gap: 15px;">
            🎓 ExamQ <span id="paperTitle" style="font-weight: 400; color: #666; font-size: 0.9em; border-left: 1px solid #ddd; padding-left: 15px;">Loading Paper...</span>
        </div>
        <div class="nav-links">
            <button onclick="toggleExtracts()" id="extractsBtn" style="display:none; background:#ffc107; border:none; padding:5px 12px; border-radius:5px; font-weight:bold; cursor:pointer;">📖 Reading Booklet</button>
            <a href="/exam_questions.html">🔙 Library</a>
            <a href="/results">📊 Results</a>
        </div>
    </div>

    <div class="main-container">
        <div class="answer-panel" id="answerPanel">
            <div id="questionList"></div>
            
            <div style="display: flex; justify-content: space-between; margin-top: auto; padding-top: 20px;">
                <button class="control-btn btn-prev" onclick="changeQuestion(-1)">← Previous</button>
                <button class="control-btn btn-next" onclick="changeQuestion(1)">Next →</button>
            </div>
        </div>

        <div class="paper-panel" id="paperPanel">
            <!-- Paper pages injected here -->
        </div>
    </div>

    <div id="extractsModal" class="extracts-modal">
        <div class="extracts-header">
            <h3>Extracts Booklet</h3>
            <button onclick="toggleExtracts()" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">&times;</button>
        </div>
        <div class="extracts-body" id="extractsBody"></div>
    </div>

    <script>
        let examData = null;
        let currentGroupIdx = 0;
        let pageGroups = [];
        let savedAnswers = {};
        let isManualJumping = false;
        let lastJumpedPage = null;
        let selectedQuestionInGroup = {}; // For choice questions

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const paperId = urlParams.get('paper_id');
            const username = localStorage.getItem('quiz_username') || localStorage.getItem('quiz_admin_username');
            
            if (!username) { window.location.href = 'login.html'; return; }

            const [examRes, progRes] = await Promise.all([
                fetch(`/api/official-exams/${paperId}`),
                fetch(`/api/student/exam-progress/get?username=${username}&paper_id=${paperId}`)
            ]);

            examData = await examRes.json();
            const prog = await progRes.json();
            
            if (prog.success) {
                savedAnswers = prog.answers || {};
                currentGroupIdx = prog.current_question_idx || 0;
                selectedQuestionInGroup = savedAnswers._selections || {};
            }

            document.getElementById('paperTitle').textContent = examData.title;
            
            // Show extracts button if pages exist
            if (examData.extract_pages && examData.extract_pages.length > 0) {
                document.getElementById('extractsBtn').style.display = 'inline-block';
                const body = document.getElementById('extractsBody');
                examData.extract_pages.forEach(p => {
                    const img = document.createElement('img');
                    img.src = `${examData.qp_img_dir}page_${p.toString().padStart(2, '0')}.png`;
                    img.className = 'paper-page';
                    body.appendChild(img);
                });
            }

            // Group questions by their first page to create logical steps
            let groups = [];
            examData.questions.forEach(q => {
                const firstPage = q.sub_questions[0].qp_pages[0];
                let group = groups.find(g => g.page === firstPage);
                if (!group) {
                    group = { page: firstPage, questions: [] };
                    groups.push(group);
                }
                group.questions.push(q);
            });
            pageGroups = groups;

            render();
        }

        function render() {
            const list = document.getElementById('questionList');
            const paper = document.getElementById('paperPanel');
            list.innerHTML = '';
            paper.innerHTML = '';

            const group = pageGroups[currentGroupIdx];
            
            // Load all pages relevant to this group
            const allPages = [...new Set(group.questions.flatMap(q => q.sub_questions.flatMap(sq => sq.qp_pages)))].sort((a,b)=>a-b);
            allPages.forEach(pNum => {
                const img = document.createElement('img');
                img.id = 'page_' + pNum;
                img.src = `${examData.qp_img_dir}page_${pNum.toString().padStart(2, '0')}.png`;
                img.className = 'paper-page';
                paper.appendChild(img);
            });

            const panel = document.querySelector('.answer-panel');
            panel.onscroll = () => {
                if (isManualJumping) return;
                const active = document.activeElement;
                if (active && (active.tagName === 'TEXTAREA' || active.tagName === 'INPUT')) return; 
                if (allPages.length <= 1) return;

                const items = Array.from(panel.querySelectorAll('.sub-question-item'));
                const panelTop = panel.getBoundingClientRect().top;
                let bestItem = null;
                for (let item of items) {
                    if (item.getBoundingClientRect().top <= panelTop + 150) bestItem = item;
                    else break; 
                }
                if (bestItem) {
                    const pNum = bestItem.getAttribute('data-page');
                    if (pNum && pNum != lastJumpedPage) jump(pNum, bestItem);
                }
            };

            // Handle choice groups (Section C)
            const isChoiceGroup = group.questions.length > 1 && group.questions.every(q => q.id >= 9);
            let questionsToRender = group.questions;

            if (isChoiceGroup) {
                const choiceDiv = document.createElement('div');
                choiceDiv.className = 'sub-question-item';
                choiceDiv.style.background = '#f8f9fa';
                choiceDiv.innerHTML = `
                    <div class="sub-header"><span style="font-weight:700; color:#1e3c72;">Choose One Question</span></div>
                    <div id="choiceBtns" style="display:flex; gap:10px;"></div>
                `;
                const btnContainer = choiceDiv.querySelector('#choiceBtns');
                group.questions.forEach(q => {
                    const btn = document.createElement('button');
                    btn.className = 'control-btn ' + (selectedQuestionInGroup[currentGroupIdx] === q.id ? 'btn-next' : 'btn-prev');
                    btn.textContent = 'Question ' + q.id;
                    btn.onclick = () => { selectedQuestionInGroup[currentGroupIdx] = q.id; render(); saveProgress(); };
                    btnContainer.appendChild(btn);
                });
                list.appendChild(choiceDiv);
                questionsToRender = group.questions.filter(q => q.id === selectedQuestionInGroup[currentGroupIdx]);
            }

            questionsToRender.forEach(q => {
                q.sub_questions.forEach(sq => {
                    const div = document.createElement('div');
                    div.className = 'sub-question-item';
                    div.setAttribute('data-page', sq.qp_pages[0]);
                    
                    const saved = savedAnswers[sq.sub_id] || {};
                    div.innerHTML = `
                        <div class="sub-header">
                            <span style="font-weight:800; color:#1e3c72;">Question ${sq.sub_id}</span>
                            <span class="mark-badge">${sq.max_marks} Marks</span>
                        </div>
                        <textarea id="ans_${sq.sub_id}" oninput="updateAnswer('${sq.sub_id}')" placeholder="Type your answer here...">${saved.answer || ''}</textarea>
                        <button class="control-btn btn-grade" onclick="grade('${sq.sub_id}', '${sq.type}')">Submit & Grade</button>
                        <div id="fb_${sq.sub_id}" class="feedback-zone ${saved.feedback ? 'show' : ''}">${saved.feedback || ''}</div>
                    `;
                    list.appendChild(div);
                });
            });
            
            // Jump to first page of group
            setTimeout(() => jump(group.page), 100);
        }

        function updateAnswer(id) {
            if (!savedAnswers[id]) savedAnswers[id] = {};
            savedAnswers[id].answer = document.getElementById('ans_'+id).value;
            saveProgress();
        }

        function jump(pageNum) {
            const img = document.getElementById('page_' + pageNum);
            if (img) img.scrollIntoView({ behavior: 'smooth', block: 'start' });
            lastJumpedPage = pageNum;
        }

        function toggleExtracts() {
            const m = document.getElementById('extractsModal');
            m.style.display = (m.style.display === 'flex' ? 'none' : 'flex');
        }

        async function saveProgress() {
            const username = localStorage.getItem('quiz_username') || localStorage.getItem('quiz_admin_username');
            const paperId = examData.paper_id;
            const answersToSave = { ...savedAnswers };
            answersToSave._selections = selectedQuestionInGroup;

            await fetch('/api/student/exam-progress/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username, paper_id: paperId,
                    current_question_idx: currentGroupIdx,
                    answers: answersToSave
                })
            });
        }

        async function grade(subId, type) {
            const val = document.getElementById('ans_' + subId).value;
            const btn = event.target;
            const fbDiv = document.getElementById('fb_' + subId);
            
            if (!val.trim()) { alert("Please type an answer first."); return; }

            btn.disabled = true;
            btn.innerHTML = `<span class="spinner"></span> Grading...`;

            try {
                const res = await fetch('/api/submit-quiz', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        username: localStorage.getItem('quiz_username') || localStorage.getItem('quiz_admin_username'),
                        paper_id: examData.paper_id,
                        sub_id: subId,
                        answer: val,
                        ms_text: examData.questions.flatMap(q=>q.sub_questions).find(s=>s.sub_id===subId).ms_text
                    })
                });
                const data = await res.json();
                const html = `<div style="font-weight:800; color:#28a745; margin-bottom:10px;">Score: ${data.score} / ${data.total_marks}</div><div>${data.feedback}</div>`;
                fbDiv.innerHTML = html;
                fbDiv.classList.add('show');
                savedAnswers[subId].feedback = html;
                await saveProgress();
            } catch (e) { alert("Grading failed."); }
            finally {
                btn.disabled = false;
                btn.textContent = "Re-submit & Grade";
            }
        }

        function changeQuestion(n) {
            const newIdx = currentGroupIdx + n;
            if (newIdx >= 0 && newIdx < pageGroups.length) {
                currentGroupIdx = newIdx;
                render();
                saveProgress();
            }
        }

        function logout() {
            localStorage.removeItem('quiz_username');
            localStorage.removeItem('quiz_admin_username');
            window.location.href = 'login.html';
        }

        init();
    </script>
</body>
</html>
