<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official IGCSE Exam Module</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-buttons { display: flex; gap: 10px; }
        .header-btn {
            background: white;
            color: #1e3c72;
            padding: 8px 15px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9em;
        }
        .main-container {
            display: flex;
            height: calc(100vh - 60px);
            overflow: hidden;
        }
        .paper-viewer {
            flex: 1.2;
            background-color: #525659;
            overflow-y: auto;
            padding: 20px;
            position: relative; /* Essential for offsetTop */
        }
        .paper-page {
            width: 100%;
            background: white;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: block;
        }
        .answer-panel {
            flex: 0.8;
            background: white;
            border-left: 2px solid #ddd;
            padding: 25px;
            overflow-y: auto;
        }
        .question-title {
            color: #1e3c72;
            font-size: 1.5em;
            margin-bottom: 20px;
            border-bottom: 2px solid #1e3c72;
            padding-bottom: 10px;
        }
        .sub-question-item {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            background: #fafafa;
        }
        .sub-header {
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
        }
        .mark-badge {
            background: #1e3c72;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.8em;
        }
        /* Inputs */
        .short-input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            margin-top: 5px;
        }
        .short-input:focus, textarea:focus {
            border-color: #1e3c72;
            outline: none;
            background: #fff;
        }
        /* MCQ */
        .mcq-container { display: flex; gap: 10px; margin: 10px 0; }
        .mcq-option {
            flex: 1;
            padding: 12px;
            text-align: center;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            background: white;
        }
        .mcq-option.selected {
            background: #1e3c72;
            color: white;
            border-color: #1e3c72;
        }
        /* Calculation */
        .calculation-container {
            border: 1px dashed #ccc;
            padding: 15px;
            border-radius: 8px;
            background: #fff;
        }
        .working-label { font-size: 0.8em; color: #666; font-weight: 600; }
        /* Grading */
        .grade-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            margin-top: 15px;
            width: 100%;
        }
        .feedback-box {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .feedback-box.show { display: block; }
        .feedback-good { background: #d4edda; color: #155724; }
        .feedback-partial { background: #fff3cd; color: #856404; }
        .feedback-bad { background: #f8d7da; color: #721c24; }
        
        .error-msg {
            color: #dc3545;
            font-size: 0.9em;
            margin-top: 10px;
            font-weight: 600;
            display: none;
        }
        
        .paper-controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .control-btn {
            flex: 1;
            padding: 15px;
            background: #1e3c72;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
        }
        .control-btn:disabled { opacity: 0.3; }
    </style>
</head>
<body>
    <div class="header">
        <h2 id="paperTitle">Loading...</h2>
        <div class="header-buttons">
            <a href="/results" class="header-btn">🏠 Home</a>
            <a href="/exam_questions.html" class="header-btn">📝 Papers</a>
        </div>
    </div>

    <div class="main-container">
        <div id="paperViewer" class="paper-viewer"></div>
        <div class="answer-panel">
            <h1 class="question-title" id="currentQuestionId"></h1>
            <div id="subQuestionsList"></div>
            <div class="paper-controls">
                <button id="prevBtn" class="control-btn" onclick="changeQuestion(-1)">← Previous</button>
                <button id="nextBtn" class="control-btn" onclick="changeQuestion(1)">Next →</button>
            </div>
        </div>
    </div>

    <script>
        let examData = null;
        let currentQuestionIdx = 0;
        const urlParams = new URLSearchParams(window.location.search);
        const paperId = urlParams.get('paper_id') || 'biology_2B_nov_2025';

        // THE SIMPLE SCROLL FUNCTION
        function jump(pageNum) {
            const img = document.getElementById('page_' + pageNum);
            if (img) {
                img.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        async function init() {
            const resp = await fetch(`/api/official-exams/${paperId}`);
            examData = await resp.json();
            document.getElementById('paperTitle').textContent = examData.title;
            render();
        }

        let scrollObserver = null;
        let lastJumpedPage = null;

        function render() {
            const q = examData.questions[currentQuestionIdx];
            document.getElementById('currentQuestionId').textContent = "Question " + q.id;
            
            // 1. Draw Images
            const viewer = document.getElementById('paperViewer');
            viewer.innerHTML = '';
            const pages = [...new Set(q.sub_questions.flatMap(sq => sq.qp_pages))].sort((a,b) => a-b);
            pages.forEach(p => {
                const img = document.createElement('img');
                img.src = `${examData.qp_img_dir}page_${String(p).padStart(2, '0')}.png`;
                img.className = 'paper-page';
                img.id = 'page_' + p;
                viewer.appendChild(img);
            });

            // 2. Draw Answers
            const list = document.getElementById('subQuestionsList');
            list.innerHTML = '';
            
            if (scrollObserver) scrollObserver.disconnect();
            
            scrollObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const pNum = entry.target.getAttribute('data-page');
                        if (pNum && pNum !== lastJumpedPage) {
                            lastJumpedPage = pNum;
                            jump(pNum);
                        }
                    }
                });
            }, {
                root: document.querySelector('.answer-panel'),
                rootMargin: '-20% 0px -70% 0px', // Trigger when question enters the top portion
                threshold: 0
            });

            q.sub_questions.forEach(sq => {
                const pNum = sq.qp_pages[0];
                const div = document.createElement('div');
                div.className = 'sub-question-item';
                div.setAttribute('data-page', pNum);
                
                let inputHtml = `
                    <div class="sub-header"><span>(${sq.sub_id})</span><span class="mark-badge">[${sq.max_marks}]</span></div>`;
                
                if (sq.type === 'mcq') {
                    inputHtml += `<div class="mcq-container">`;
                    sq.options.forEach(opt => {
                        inputHtml += `<div class="mcq-option" onclick="jump(${pNum}); setMcq('${sq.sub_id}', '${opt}', this)">${opt}</div>`;
                    });
                    inputHtml += `</div><input type="hidden" id="ans_${sq.sub_id}">`;
                } else if (sq.type === 'calculation') {
                    inputHtml += `<div class="calculation-container">
                        <div class="working-label">Working:</div>
                        <textarea id="work_${sq.sub_id}" onfocus="jump(${pNum})" placeholder="Show steps..."></textarea>
                        <div style="text-align:right; margin-top:10px;">
                            <b>Final:</b> <input type="text" id="ans_${sq.sub_id}" onfocus="jump(${pNum})" style="width:100px;"> ${sq.suffix || ''}
                        </div>
                    </div>`;
                } else if (sq.type === 'list') {
                    for(let i=1; i<=sq.count; i++) {
                        inputHtml += `<div style="margin-bottom:5px;">${i}. <input type="text" class="list-in-${sq.sub_id}" onfocus="jump(${pNum})" style="width:80%;"></div>`;
                    }
                } else {
                    inputHtml += `<textarea id="ans_${sq.sub_id}" onfocus="jump(${pNum})" placeholder="Type answer here..."></textarea>`;
                }

                inputHtml += `<button class="grade-btn" onclick="grade('${sq.sub_id}', ${sq.max_marks}, \`${sq.ms_text}\`, '${sq.type}')">Submit & Grade</button>
                    <div id="err_${sq.sub_id}" class="error-msg">⚠️ Please provide an answer or show some working.</div>
                    <div id="fb_${sq.sub_id}" class="feedback-box">
                        <b>Marks: <span id="m_${sq.sub_id}"></span> / ${sq.max_marks}</b>
                        <p id="t_${sq.sub_id}" style="margin-top:10px;"></p>
                        <div style="margin-top:10px; font-size:0.8em; background:#eee; padding:5px;"><b>Mark Scheme:</b><br>${sq.ms_text}</div>
                    </div>`;
                
                div.innerHTML = inputHtml;
                list.appendChild(div);
                scrollObserver.observe(div);
            });

            document.getElementById('prevBtn').disabled = (currentQuestionIdx === 0);
            document.getElementById('nextBtn').disabled = (currentQuestionIdx === examData.questions.length - 1);
            
            setTimeout(() => jump(pages[0]), 100);
        }

        function setMcq(id, val, el) {
            const opts = el.parentElement.querySelectorAll('.mcq-option');
            opts.forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('ans_' + id).value = val;
        }

        async function grade(subId, max, ms, type) {
            let answer = "";
            let isBlank = false;
            const errDiv = document.getElementById('err_' + subId);
            const fbDiv = document.getElementById('fb_' + subId);

            if (type === 'list') {
                const inputs = Array.from(document.querySelectorAll('.list-in-' + subId));
                if (inputs.every(i => !i.value.trim())) isBlank = true;
                answer = inputs.map(i => i.value).join("; ");
            } else if (type === 'calculation') {
                const work = document.getElementById('work_'+subId).value.trim();
                const final = document.getElementById('ans_'+subId).value.trim();
                if (!work && !final) isBlank = true;
                answer = "WORKING: " + work + " | FINAL: " + final;
            } else {
                answer = document.getElementById('ans_' + subId).value.trim();
                if (!answer) isBlank = true;
            }

            if (isBlank) {
                errDiv.style.display = 'block';
                fbDiv.classList.remove('show');
                return;
            }
            
            errDiv.style.display = 'none';

            const btn = event.target;
            btn.disabled = true; btn.textContent = "Grading...";

            const res = await fetch('/api/official-exams/grade', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({paper_id: paperId, sub_id: subId, user_answer: answer, mark_scheme: ms, max_marks: max})
            });
            
            const data = await res.json();
            const fb = document.getElementById('fb_' + subId);
            fb.className = 'feedback-box show ' + (data.marks_awarded == max ? 'feedback-good' : (data.marks_awarded > 0 ? 'feedback-partial' : 'feedback-bad'));
            document.getElementById('m_' + subId).textContent = data.marks_awarded;
            document.getElementById('t_' + subId).innerText = data.feedback;
            btn.disabled = false; btn.textContent = "Re-submit & Grade";
        }

        function changeQuestion(n) {
            currentQuestionIdx += n;
            render();
        }

        init();
    </script>
</body>
</html>
