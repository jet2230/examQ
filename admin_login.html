<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Quiz System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 1.8em;
            margin-bottom: 10px;
        }
        .header p {
            opacity: 0.9;
        }
        .form-content {
            padding: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #dc3545;
        }
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(220, 53, 69, 0.3);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
            margin-top: 10px;
        }
        .error-message {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .error-message.show {
            display: block;
        }
        .info-message {
            background: #d1ecf1;
            border: 1px solid #bee5eb;
            color: #0c5460;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9em;
        }
        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #667eea;
        }
        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 Admin Login</h1>
            <p>Admin access to view quiz results</p>
        </div>

        <div class="form-content">
            <div class="info-message">
                <strong>Default credentials:</strong><br>
                Username: admin<br>
                Password: pass123
            </div>

            <div class="error-message" id="errorMessage"></div>

            <form id="loginForm" onsubmit="handleSubmit(event)">
                <div class="form-group">
                    <label for="username">👤 Admin Username</label>
                    <input type="text" id="username" name="username" required placeholder="Enter admin username">
                </div>

                <div class="form-group">
                    <label for="password">🔒 Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter admin password">
                </div>

                <button type="submit" class="btn" id="submitBtn">Login as Admin</button>
            </form>

            <div class="login-link">
                <a href="/">Student Login</a>
            </div>
        </div>
    </div>

    <script>
        function handleSubmit(event) {
            event.preventDefault();

            const username = document.getElementById('username').value.trim().toLowerCase();
            const password = document.getElementById('password').value;

            hideMessages();

            // Disable submit button
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'Logging in...';

            // Send login request
            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    if (data.role !== 'admin') {
                        showError('Access denied. Admin account required.');
                        return;
                    }

                    // Save admin credentials to localStorage
                    localStorage.removeItem('quiz_username');
                    localStorage.setItem('quiz_admin_username', data.username);
                    showSuccess(data.message);

                    setTimeout(() => {
                        // Go to results dashboard
                        window.location.href = '/results';
                    }, 1000);
                } else {
                    showError(data.message || 'Login failed');
                }
            })
            .catch(error => {
                showError('Error connecting to server. Make sure the server is running on port 5001.');
            })
            .finally(() => {
                btn.disabled = false;
                btn.textContent = 'Login as Admin';
            });
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = '❌ ' + message;
            errorDiv.classList.add('show');
            setTimeout(() => errorDiv.classList.remove('show'), 5000);
        }

        function showSuccess(message) {
            // For now, just redirect - could add a success message div if needed
        }

        function hideMessages() {
            document.getElementById('errorMessage').classList.remove('show');
        }

        // Auto-fill username if previously saved
        window.onload = function() {
            const savedUsername = localStorage.getItem('quiz_admin_username');
            if (savedUsername) {
                document.getElementById('username').value = savedUsername;
            }
        };
    </script>
</body>
</html>
