<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExamQ - UNO</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="/static/theme_manager.js"></script>
    <script src="/static/online_status.js"></script>
    <style>
        :root { --primary-color: #1e3c72; --secondary-color: #2a5298; --main-gradient: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%); --uno-red: #ff5555; --uno-blue: #5555ff; --uno-green: #55aa55; --uno-yellow: #ffaa00; --uno-black: #222; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--main-gradient); min-height: 100vh; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); overflow: hidden; display: flex; flex-direction: column; min-height: 80vh; position: relative; }
        .header { background: #f8f9fa; padding: 20px 40px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .content { padding: 30px; text-align: center; flex: 1; display: flex; flex-direction: column; }
        .card { width: 80px; height: 120px; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-weight: 900; font-size: 1.5em; color: white; position: relative; cursor: pointer; user-select: none; transition: all 0.2s; border: 3px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); margin: 5px; outline: none; font-family: inherit; }
        .card:hover { transform: translateY(-15px) scale(1.1); z-index: 10; box-shadow: 0 10px 20px rgba(0,0,0,0.3); filter: brightness(1.1); }
        .card.disabled { cursor: not-allowed; filter: grayscale(0.5); opacity: 0.8; }
        .card.disabled:hover { transform: none; }
        .card-red { background-color: var(--uno-red); }
        .card-blue { background-color: var(--uno-blue); }
        .card-green { background-color: var(--uno-green); }
        .card-yellow { background-color: var(--uno-yellow); }
        .card-black { background-color: var(--uno-black); }
        .card-inner { border: 2px solid rgba(255,255,255,0.3); width: 85%; height: 85%; border-radius: 50% / 40%; display: flex; justify-content: center; align-items: center; transform: rotate(-15deg); pointer-events: none; }
        .hand-area { background: #f1f4f9; padding: 20px; border-radius: 15px; min-height: 160px; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; border: 2px dashed #ddd; transition: all 0.3s; }
        .hand-area.not-my-turn { filter: grayscale(0.8); opacity: 0.6; pointer-events: none; }
        .draw-pile { width: 80px; height: 120px; background: var(--uno-black); border: 3px solid white; border-radius: 10px; display: flex; justify-content: center; align-items: center; color: var(--uno-red); font-weight: 900; font-size: 1.2em; cursor: pointer; box-shadow: 4px 4px 0 #444; transition: transform 0.1s; outline: none; font-family: inherit; }
        .draw-pile.not-my-turn { filter: grayscale(0.8); opacity: 0.6; pointer-events: none; }
        .draw-pile:hover:not(.not-my-turn) { transform: scale(1.05); }
        .btn-action { background: var(--main-gradient); color: white; border: none; padding: 12px 30px; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .players-panel { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .player-chip { padding: 8px 15px; background: #f8f9fa; border-radius: 20px; border: 2px solid #eee; display: flex; align-items: center; gap: 10px; font-size: 0.9em; }
        .player-chip.active-turn { border-color: #28a745; background: #e8f5e9; box-shadow: 0 0 10px rgba(40,167,69,0.2); }
        .color-picker { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 50px rgba(0,0,0,0.5); z-index: 1000; }
        .color-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .color-btn { width: 80px; height: 80px; border-radius: 10px; border: 4px solid white; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        #gameOverlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 100; flex-direction: column; justify-content: center; align-items: center; }
        .overlay-title { font-size: 3em; font-weight: 800; margin-bottom: 20px; }
        .user-card { padding: 8px 12px; border: 1px solid #eee; border-radius: 8px; cursor: pointer; font-size: 0.8em; background: #fdfdfd; }
        .user-card.selected { background: #e3f2fd; border-color: #1e3c72; border-width: 2px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div><h2 style="color: var(--primary-color);">UNO Multiplayer</h2><div id="gameStatus" style="font-size: 0.8em; color: #666;">Initializing...</div></div>
            <button class="btn-action" style="background:#dc3545; padding:8px 15px; font-size:0.8em;" onclick="leaveGame()">🚪 Leave</button>
        </div>
        <div class="content">
            <div id="lobbyView" style="display:none;">
                <div id="hostControls" style="display:none; margin-bottom:30px;"><button class="btn-action" onclick="startGame()">Start Game Now</button></div>
                <div id="guestWait" style="display:none; margin-bottom:30px;"><p style="color:#666;">Waiting for host...</p></div>
                <div class="players-panel" id="lobbyPlayers"></div>
                <div id="hostInviteArea" style="display:none; margin-top:30px; padding:20px; background:#f8f9fa; border-radius:15px;">
                    <h4 style="margin-bottom:15px;">Invite Students</h4><div id="inviteUserList" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(120px, 1fr)); gap:10px; max-height:150px; overflow-y:auto; margin-bottom:15px;"></div>
                    <button class="btn-action" style="width:100%;" onclick="sendLobbyInvites()">Send Invitations</button>
                </div>
            </div>
            <div id="gameView" style="display:none;">
                <div id="playerIndicators" class="players-panel" style="margin-top:0;"></div>
                <div class="deck-area">
                    <div><div style="font-size:0.7em; color:#999; margin-bottom:5px;">DRAW</div><button class="draw-pile" onclick="drawCard()">DRAW</button></div>
                    <div><div style="font-size:0.7em; color:#999; margin-bottom:5px;">DISCARD</div><div id="topCard"></div></div>
                </div>
                <div style="margin: 15px 0;"><div id="colorIndicator" style="display:inline-block; padding:5px 15px; border-radius:15px; color:white; font-weight:bold; font-size:0.8em; text-transform:uppercase;"></div></div>
                <div style="margin-top:20px;"><div style="font-size:0.8em; color:#666; margin-bottom:10px; font-weight:bold;">YOUR HAND</div><div id="myHand" class="hand-area"></div></div>
            </div>
            <div id="gameOverlay">
                <div class="overlay-title" id="overlayTitle">GAME OVER</div>
                <p id="overlayMessage" style="font-size: 1.2em; color: #666; margin-bottom:30px;"></p>
                <div id="overlayPlayerList" style="margin-bottom:20px; padding:15px; background:#f1f4f9; border-radius:12px; font-size:0.9em; width:100%; max-width:400px; color:#333;"></div>
                <div style="display:flex; gap:15px;"><button id="playAgainBtn" class="btn-action" style="background:#28a745; display:none;" onclick="resetGame()">🎮 Play Again</button><button class="btn-action" style="background:#6c757d;" onclick="leaveGame()">🚪 Quit Game</button></div>
            </div>
            <div id="processingOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.7); z-index:2000; justify-content:center; align-items:center; flex-direction:column;">
                <div style="width:50px; height:50px; border:5px solid #f3f3f3; border-top:5px solid var(--primary-color); border-radius:50%; animation: spin 1s linear infinite;"></div>
                <div style="margin-top:15px; font-weight:700; color:var(--primary-color);">Processing...</div>
            </div>
        </div>
    </div>
    <div id="colorPicker" class="color-picker">
        <h3>Choose a Color</h3>
        <div class="color-grid">
            <button class="color-btn" style="background:var(--uno-red);" onclick="selectColor('red')"></button>
            <button class="color-btn" style="background:var(--uno-blue);" onclick="selectColor('blue')"></button>
            <button class="color-btn" style="background:var(--uno-green);" onclick="selectColor('green')"></button>
            <button class="color-btn" style="background:var(--uno-yellow);" onclick="selectColor('yellow')"></button>
        </div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search), sessionId = urlParams.get('id'), username = (localStorage.getItem('quiz_username') || localStorage.getItem('quiz_admin_username') || '').trim();
        let session = null, pollInterval = null, isUpdating = false, overlayTimeout = null;
        let confettiShown = false;

        async function init() {
            if (!sessionId || !username) { location.href = 'games.html'; return; }
            await fetch('/api/games/respond', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ session_id: sessionId, username, action: 'accept' }) });
            await fetchSession(true); pollInterval = setInterval(() => fetchSession(false), 2000);
        }
        async function fetchSession(force = false) {
            try {
                const res = await fetch(`/api/games/session/${sessionId}?t=${Date.now()}`);
                if (res.status === 404) { clearInterval(pollInterval); location.href = 'games.html'; return; }
                const data = await res.json();
                if (data.success) {
                    const sc = !session || data.session.status !== session.status, vc = !session || data.session.version > session.version, pc = !session || JSON.stringify(data.session.players) !== JSON.stringify(session.players);
                    if (force || sc || vc || pc) { session = data.session; updateUI(); }
                }
            } catch (e) { console.error(e); }
        }
        function updateUI() {
            if (!session) return; const acc = session.players.filter(p => p.status === 'accepted'), isH = session.host?.toLowerCase() === username.toLowerCase();
            
            // Hide overlay by default unless finished
            if (session.status !== 'finished') {
                document.getElementById('gameOverlay').style.display = 'none';
            } else {
                const listEl = document.getElementById('overlayPlayerList');
                if (listEl) {
                    listEl.innerHTML = `<div style="font-weight:bold; margin-bottom:10px; color:var(--primary-color);">Players waiting (${acc.length}):</div>` + 
                        acc.map(p => `<span>${p.username}${p.username.toLowerCase() === session.host.toLowerCase() ? ' (Host)' : ''}</span>`).join(', ');
                }
            }

            if (session.status === 'pending') {
                confettiShown = false; // Reset ONLY when back in lobby
                document.getElementById('lobbyView').style.display = 'block'; document.getElementById('gameView').style.display = 'none';
                
                // Accessible to ALL users
                document.getElementById('hostInviteArea').style.display = 'block';
                loadInvites();

                if (isH) { document.getElementById('hostControls').style.display = 'block'; document.getElementById('guestWait').style.display = 'none'; }
                else { document.getElementById('hostControls').style.display = 'none'; document.getElementById('guestWait').style.display = 'block'; }
                
                document.getElementById('lobbyPlayers').innerHTML = acc.map(p => {
                    const disp = p.username.length > 10 ? p.username.substring(0,10) + '...' : p.username;
                    return `<div class="player-chip"><strong>${disp}</strong>${p.username.toLowerCase() === session.host.toLowerCase() ? ' (H)' : ''}</div>`;
                }).join('');
            } else {
                document.getElementById('lobbyView').style.display = 'none'; document.getElementById('gameView').style.display = 'block';
                renderActive(); if (session.status === 'finished') showGameOver(); else document.getElementById('gameOverlay').style.display = 'none';
            }
        }
        function renderActive() {
            const s = session.state; if (!s) return; const isMyT = s.currentTurn?.toLowerCase() === username.toLowerCase();
            document.getElementById('gameStatus').textContent = isMyT ? "YOUR TURN!" : `Waiting for ${s.currentTurn}...`;
            document.getElementById('myHand').className = 'hand-area' + (!isMyT ? ' not-my-turn' : '');
            document.querySelector('.draw-pile').className = 'draw-pile' + (!isMyT ? ' not-my-turn' : '');
            const top = s.discard[s.discard.length - 1]; document.getElementById('topCard').innerHTML = createCardHtml(top);
            const ind = document.getElementById('colorIndicator'); ind.textContent = `Current Color: ${s.currentColor}`; ind.style.backgroundColor = `var(--uno-${s.currentColor})`;
            document.getElementById('myHand').innerHTML = (s.hands[username] || []).map((c, i) => createCardHtml(c, i, isMyT && canPlay(c))).join('');
            document.getElementById('playerIndicators').innerHTML = s.playersOrder.map(u => `<div class="player-chip ${u.toLowerCase() === s.currentTurn.toLowerCase() ? 'active-turn' : ''}"><strong>${u}</strong> <span>(${s.hands[u]?.length || 0})</span></div>`).join('');
        }
        function createCardHtml(c, i = -1, p = false) { const l = c.value === 'Draw2' ? '+2' : (c.value === 'WildDraw4' ? '+4' : c.value); return `<button class="card card-${c.color} ${!p && i !== -1 ? 'disabled' : ''}" ${p ? `onclick="playCard(${i})"` : ''}><div class="card-inner">${l}</div></button>`; }
        function canPlay(c) { const s = session.state, top = s.discard[s.discard.length - 1], cur = s.currentColor || top.color; return c.color === 'black' || c.color === cur || c.value === top.value; }
        async function playCard(i) { if (isUpdating) return; if (session.state.hands[username][i].color === 'black') { window.pendingPlayIndex = i; document.getElementById('colorPicker').style.display = 'block'; return; } await perform('PLAY_CARD', { card_idx: i }); }
        async function selectColor(c) { document.getElementById('colorPicker').style.display = 'none'; if (window.pendingPlayIndex !== undefined) { const idx = window.pendingPlayIndex; delete window.pendingPlayIndex; isUpdating = true; await perform('PLAY_CARD', { card_idx: idx }); await perform('SELECT_COLOR', { color: c }); } }
        async function drawCard() { if (isUpdating || session.state.currentTurn.toLowerCase() !== username.toLowerCase()) return; await perform('DRAW_CARD', {}); }
        async function perform(a, p) {
            overlayTimeout = setTimeout(() => { document.getElementById('processingOverlay').style.display = 'flex'; }, 200);
            try { await fetch('/api/games/action', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ session_id: sessionId, username, action: a, params: p, version: session.version }) }); await fetchSession(true); }
            finally { clearTimeout(overlayTimeout); document.getElementById('processingOverlay').style.display = 'none'; setTimeout(() => isUpdating = false, 500); }
        }
        async function startGame() { isUpdating = true; try { await fetch('/api/games/update', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ session_id: sessionId, state: { starting: true, updatedAt: Date.now() }, status: 'active' }) }); await fetchSession(true); } finally { isUpdating = false; } }
        async function resetGame() { isUpdating = true; try { await fetch('/api/games/update', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ session_id: sessionId, state: { restarting: true, updatedAt: Date.now() }, status: 'pending', new_host: username }) }); await fetchSession(true); } finally { isUpdating = false; } }
        function showGameOver() {
            const o = document.getElementById('gameOverlay'); o.style.display = 'flex';
            const win = session.state.winner?.toLowerCase() === username.toLowerCase();
            const isH = session.host?.toLowerCase() === username.toLowerCase();
            const title = document.getElementById('overlayTitle');
            const msg = document.getElementById('overlayMessage');

            if (win) {
                title.textContent = "YOU WIN!"; title.style.color = "#28a745";
                if (!confettiShown) {
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, zIndex: 1000 });
                    confettiShown = true;
                }
            } else {
                title.textContent = "YOU LOSE!"; title.style.color = "#dc3545";
            }
            
            let messageHtml = `Winner: <strong>${session.state.winner}</strong>`;
            if (!win && !isH) {
                messageHtml += `<br><br><span style="color:#1e3c72; font-weight:bold;">Please wait for the host (${session.host}) to restart the game...</span>`;
            } else if (isH) {
                messageHtml += `<br><br><span style="color:#28a745; font-weight:bold;">The other players are waiting for you to start a new game!</span><br>`;
                messageHtml += `<button class="btn-action" style="background:#28a745; margin-top:15px;" onclick="resetGame()">🎮 Play Again</button>`;
            }
            
            msg.innerHTML = messageHtml;
            document.getElementById('playAgainBtn').style.display = 'none';
        }
        async function loadInvites() {
            const list = document.getElementById('inviteUserList'); if (!list || list.getAttribute('data-loaded')) return;
            const res = await fetch('/api/users/all'); const data = await res.json();
            if (data.success) {
                const cur = session.players.map(p => p.username.toLowerCase());
                const ai = ['Bob', 'Tim'];
                list.innerHTML = data.users.filter(u => u.username.toLowerCase() !== username.toLowerCase() && !cur.includes(u.username.toLowerCase())).map(u => {
                    const disp = u.username.length > 10 ? u.username.substring(0,10) + '...' : u.username;
                    const isAI = ai.includes(u.username);
                    const statusDot = `<span style="width:8px; height:8px; background:${u.is_online ? '#28a745' : '#ccc'}; border-radius:50%; display:inline-block; margin-right:5px;"></span>`;
                    return `<div class="user-card" onclick="toggleInviteSelection(this, '${u.username}')">${statusDot}${disp}${isAI ? ' (ai)' : ''}</div>`;
                }).join('') || 'None';
                list.setAttribute('data-loaded', 'true');
            }
        }

        let invites = new Set();
        function toggleInvite(el, u) { if (invites.has(u)) { invites.delete(u); el.classList.remove('selected'); } else { invites.add(u); el.classList.add('selected'); } }
        async function sendLobbyInvites() { if (!invites.size) return; await fetch('/api/games/invite', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ host: username, game_type: 'UNO', invitees: Array.from(invites), session_id: sessionId }) }); alert("Sent!"); invites.clear(); document.getElementById('inviteUserList').removeAttribute('data-loaded'); loadInvites(); }
        async function leaveGame() { if (confirm("Leave?")) { await fetch('/api/games/leave', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ session_id: sessionId, username }) }); location.href = 'games.html'; } }
        init();
    </script>
</body>
</html>
