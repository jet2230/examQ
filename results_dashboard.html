<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExamQ - Results Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 1.1em; }
        
        .navbar {
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
        }
        .nav-links a {
            text-decoration: none;
            color: #1e3c72;
            font-weight: 600;
            margin-left: 20px;
        }
        .content { padding: 40px; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #eee;
        }
        .stat-value { font-size: 2.2em; font-weight: 800; color: #1e3c72; }
        .stat-label { font-size: 0.9em; color: #666; text-transform: uppercase; font-weight: 700; margin-top: 5px; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f1f3f5; color: #1e3c72; font-weight: 700; }
        .score-badge {
            padding: 5px 12px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 0.9em;
        }
        .score-high { background: #d4edda; color: #155724; }
        .score-med { background: #fff3cd; color: #856404; }
        .score-low { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <div class="navbar">
            <div style="font-weight: 800; color: #1e3c72; font-size: 1.2em;">🎓 ExamQ Results</div>
            <div class="nav-links">
                <span id="welcomeUser" style="margin-right: 15px; font-weight: 600; color: #1e3c72;"></span>
                <a href="/admin_users.html" id="usersLink" class="admin-only" style="display:none; color:#d63384;">⚙️ Users</a>
                <a href="/admin_exams.html" id="adminLink" class="admin-only" style="display:none; color:#d63384;">⚙️ Exams</a>
                <a href="/">🏠 Generator</a>
                <a href="/exam_questions.html">📖 Library</a>
                <a href="#" onclick="logout()">🚪 Logout</a>
            </div>
        </div>

        <div class="header">
            <h1>Performance Dashboard</h1>
            <p>Track your progress and review previous attempts.</p>
        </div>

        <div class="content">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="totalQuizzes">0</div>
                    <div class="stat-label">Total Attempts</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="avgScore">0%</div>
                    <div class="stat-label">Average Score</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="topTopic">-</div>
                    <div class="stat-label">Best Subject</div>
                </div>
            </div>

            <h2 style="color: #1e3c72; margin-bottom: 20px;">Recent Activity</h2>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Topic / Paper</th>
                        <th>Score</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="resultsTable">
                    <!-- Results injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function logout() {
            localStorage.removeItem('quiz_username');
            localStorage.removeItem('quiz_admin_username');
            window.location.href = 'login.html';
        }

        async function loadResults() {
            const u = localStorage.getItem('quiz_username') || localStorage.getItem('quiz_admin_username');
            const isAdmin = !!localStorage.getItem('quiz_admin_username');
            if (!u) { window.location.href = 'login.html'; return; }

            document.getElementById('welcomeUser').textContent = '👤 ' + u;
            if (isAdmin) {
                document.getElementById('adminLink').style.display = 'inline';
                document.getElementById('usersLink').style.display = 'inline';
            }

            try {
                const res = await fetch(`/api/results?username=${u}`);
                const data = await res.json();
                
                const table = document.getElementById('resultsTable');
                table.innerHTML = '';
                
                let totalPct = 0;
                data.results.forEach(r => {
                    const pct = Math.round((r.score / r.total_marks) * 100) || 0;
                    totalPct += pct;
                    
                    let badgeClass = 'score-low';
                    if (pct >= 70) badgeClass = 'score-high';
                    else if (pct >= 40) badgeClass = 'score-med';

                    const tr = document.createElement('tr');
                    const date = new Date(r.timestamp).toLocaleDateString();
                    tr.innerHTML = `
                        <td>${date}</td>
                        <td><strong>${r.topic || 'Official Paper'}</strong></td>
                        <td><span class="score-badge ${badgeClass}">${r.score} / ${r.total_marks} (${pct}%)</span></td>
                        <td>Completed</td>
                    `;
                    table.appendChild(tr);
                });

                document.getElementById('totalQuizzes').textContent = data.results.length;
                if (data.results.length > 0) {
                    document.getElementById('avgScore').textContent = Math.round(totalPct / data.results.length) + '%';
                }

            } catch (e) { console.error(e); }
        }

        loadResults();
    </script>
</body>
</html>
