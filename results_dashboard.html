<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExamQ - Results Dashboard</title>
    <script src="/static/theme_manager.js"></script>
    <script src="/static/online_status.js"></script>
    <style>
        :root {
            --primary-color: #1e3c72;
            --secondary-color: #2a5298;
            --main-gradient: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--main-gradient);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            overflow: hidden;
        }
        .header {
            background: var(--main-gradient);
            color: white;
            padding: 40px;
            text-align: center;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 1.1em; }
        
        .navbar {
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            background: white;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .nav-brand { font-weight: 800; color: var(--primary-color); font-size: 1.2em; }
        .nav-links { display: flex; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--primary-color); font-weight: 600; margin-left: 20px; }
        
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 5px;
        }
        .hamburger div {
            width: 25px;
            height: 3px;
            background-color: var(--primary-color);
            border-radius: 2px;
        }

        @media (max-width: 850px) {
            .hamburger { display: flex; }
            .nav-links {
                display: none;
                width: 100%;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                background: white;
                padding: 20px;
                box-shadow: 0 10px 20px rgba(0,0,0,0.1);
                border-bottom: 1px solid #eee;
            }
            .nav-links.active { display: flex; }
            .nav-links a { margin: 10px 0; font-size: 1.1em; }
        }
        .content { padding: 40px; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #eee;
        }
        .stat-value { font-size: 2.2em; font-weight: 800; color: var(--primary-color); }
        .stat-label { font-size: 0.9em; color: #666; text-transform: uppercase; font-weight: 700; margin-top: 5px; }

        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #eee;
            align-items: flex-end;
            flex-wrap: wrap;
        }
        .filter-group { flex: 1; min-width: 200px; }
        .filter-group label { display: block; font-size: 0.8em; font-weight: 700; color: #666; margin-bottom: 5px; text-transform: uppercase; }
        .filter-input { width: 100%; padding: 10px 15px; border: 2px solid #eee; border-radius: 8px; outline: none; font-size: 0.95em; }
        .filter-input:focus { border-color: var(--primary-color); }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f1f3f5; color: var(--primary-color); font-weight: 700; }
        tr:hover td { background-color: #f1f4f9; }
        
        .table-container { overflow: hidden; width: 100%; position: relative; }
        #resultsTable { transition: transform 0.3s ease, opacity 0.3s ease; }
        .slide-out-left { transform: translateX(-30px); opacity: 0; }
        .slide-out-right { transform: translateX(30px); opacity: 0; }
        
        .score-badge { padding: 5px 12px; border-radius: 12px; font-weight: 800; font-size: 0.9em; }
        .score-high { background: #d4edda; color: #155724; }
        .score-med { background: #fff3cd; color: #856404; }
        .score-low { background: #f8d7da; color: #721c24; }

        .btn-view { background: var(--primary-color); color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: opacity 0.2s; }
        .btn-view:hover { opacity: 0.9; }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: white; margin: 50px auto; max-width: 900px; max-height: 85vh; border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; }
        .modal-header { padding: 20px 30px; background: #f1f3f5; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 30px; overflow-y: auto; flex: 1; }
        .review-q-card { background: #f8f9fa; border-radius: 12px; padding: 20px; margin-bottom: 20px; border-left: 5px solid #ddd; }
        .review-q-card.correct { border-left-color: #28a745; }
        .review-q-card.wrong { border-left-color: #dc3545; }
        .q-text { font-weight: 700; color: #333; margin-bottom: 10px; }
        .ans-text { color: #555; margin-bottom: 10px; font-style: italic; }
        .fb-text { background: white; padding: 15px; border-radius: 8px; border: 1px solid #eee; font-size: 0.95em; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="container">
        <div class="navbar">
            <div class="nav-brand">🎓 ExamQ Results</div>
            <div class="hamburger" onclick="toggleMenu()">
                <div></div>
                <div></div>
                <div></div>
            </div>
            <div class="nav-links" id="navLinks">
                <span id="welcomeUser" style="margin-right: 15px; font-weight: 600; color: var(--primary-color);"></span>
                <a href="/admin_users.html" id="usersLink" style="display:none; color:#d63384;">⚙️ Users</a>
                <a href="/admin_exams.html" id="adminLink" style="display:none; color:#d63384;">⚙️ Exams</a>
                <a href="/">🏠 Generator</a>
                <a href="/exam_questions.html">📖 Exam Library</a>
                <a href="/settings.html">⚙️ Settings</a>
                <a href="#" onclick="logout()">🚪 Logout</a>
            </div>
        </div>

        <div class="header">
            <h1>Performance Dashboard</h1>
            <p>Track progress and review student completions.</p>
        </div>

        <div class="content">
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-value" id="totalQuizzes">0</div><div class="stat-label">Total Attempts</div></div>
                <div class="stat-card"><div class="stat-value" id="avgScore">0%</div><div class="stat-label">Average Score</div></div>
                <div class="stat-card"><div class="stat-value" id="topTopic">-</div><div class="stat-label">Recent Student</div></div>
            </div>

            <div class="filter-bar">
                <div class="filter-group">
                    <label>Search Topic / Paper</label>
                    <input type="text" id="searchTopic" class="filter-input" placeholder="🔍 Filter by name..." oninput="renderTable(true)">
                </div>
                <div id="studentFilterGroup" class="filter-group" style="display:none;">
                    <label>Search Student</label>
                    <input type="text" id="searchStudent" class="filter-input" placeholder="👤 Filter by username..." oninput="renderTable(true)">
                </div>
                <div class="filter-group" style="max-width: 150px;">
                    <label>Min Score %</label>
                    <input type="number" id="minScore" class="filter-input" placeholder="0" min="0" max="100" oninput="renderTable(true)">
                </div>
            </div>

            <h2 style="color: var(--primary-color); margin-bottom: 20px;">Detailed Activity</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th id="studentHeader" style="display:none;">Student</th>
                            <th>Topic / Paper</th>
                            <th>Score</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="resultsTable"></tbody>
                </table>
            </div>
            
            <div id="paginationControls" style="display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 30px;">
                <button class="tool-btn" id="prevPageBtn" onclick="changePage(-1)" style="width: auto; padding: 8px 20px;">&lt; Previous 10</button>
                <span id="pageInfo" style="font-weight: 600; color: #666;">Page 1</span>
                <button class="tool-btn" id="nextPageBtn" onclick="changePage(1)" style="width: auto; padding: 8px 20px;">Next 10 &gt;</button>
            </div>
        </div>
    </div>

    <div id="reviewModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Attempt Review</h2>
                <span style="cursor:pointer; font-size: 24px;" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('navLinks').classList.toggle('active');
        }
        let allResults = [];
        let isAdmin = false;
        let currentPage = 0;
        const pageSize = 10;

        function logout() { localStorage.removeItem('quiz_username'); localStorage.removeItem('quiz_admin_username'); window.location.href = 'login.html'; }

        async function loadResults() {
            const u = localStorage.getItem('quiz_username') || localStorage.getItem('quiz_admin_username');
            isAdmin = !!localStorage.getItem('quiz_admin_username');
            if (!u) { window.location.href = 'login.html'; return; }

            const welcomeEl = document.getElementById('welcomeUser');
            const displayUser = u.length > 6 ? u.substring(0, 6) + '...' : u;
            welcomeEl.textContent = '👤 ' + displayUser;
            welcomeEl.title = u;

            if (u) {
                // Show student header and filter for everyone now
                document.getElementById('studentHeader').style.display = 'table-cell';
                document.getElementById('studentFilterGroup').style.display = 'block';
                
                if (isAdmin) {
                    document.getElementById('adminLink').style.display = 'inline';
                    document.getElementById('usersLink').style.display = 'inline';
                }
            }

            try {
                const res = await fetch(`/api/results?username=${u}`);
                const data = await res.json();
                allResults = data.results || [];
                renderTable();
            } catch (e) { console.error(e); }
        }

        function changePage(delta) {
            const table = document.getElementById('resultsTable');
            const directionClass = delta > 0 ? 'slide-out-left' : 'slide-out-right';
            const enterClass = delta > 0 ? 'slide-out-right' : 'slide-out-left';

            table.classList.add(directionClass);

            setTimeout(() => {
                currentPage += delta;
                renderTable();
                
                table.classList.remove(directionClass);
                table.classList.add(enterClass);
                table.style.transition = 'none';
                
                // Force reflow
                table.offsetHeight;
                
                table.style.transition = '';
                table.classList.remove(enterClass);
                window.scrollTo({ top: document.querySelector('h2').offsetTop - 100, behavior: 'smooth' });
            }, 200);
        }

        function renderTable(resetPage = false) {
            if (resetPage) currentPage = 0;
            const topicQuery = document.getElementById('searchTopic').value.toLowerCase();
            const studentQuery = document.getElementById('searchStudent').value.toLowerCase();
            const minScorePct = parseInt(document.getElementById('minScore').value) || 0;

            const table = document.getElementById('resultsTable');
            table.innerHTML = '';

            // 1. Filter all results first
            const filtered = allResults.filter(r => {
                const pct = Math.round((r.score / r.total_marks) * 100) || 0;
                if (topicQuery && !r.topic.toLowerCase().includes(topicQuery)) return false;
                if (isAdmin && studentQuery && !r.username.toLowerCase().includes(studentQuery)) return false;
                if (pct < minScorePct) return false;
                return true;
            });

            // 2. Update stats based on ALL filtered results
            const totalPct = filtered.reduce((acc, r) => acc + (Math.round((r.score / r.total_marks) * 100) || 0), 0);
            document.getElementById('totalQuizzes').textContent = filtered.length;
            document.getElementById('avgScore').textContent = filtered.length > 0 ? Math.round(totalPct / filtered.length) + '%' : '0%';
            
            if (filtered.length > 0 && isAdmin) {
                const topUser = filtered[0].username; // Most recent student in current filter
                document.getElementById('topTopic').textContent = topUser.length > 6 ? topUser.substring(0,6)+'...' : topUser;
                document.getElementById('topTopic').title = topUser;
            } else if (!isAdmin) {
                document.getElementById('topTopic').textContent = '-';
            }

            // 3. Handle Pagination Logic
            const totalPages = Math.ceil(filtered.length / pageSize);
            if (currentPage < 0) currentPage = 0;
            if (currentPage >= totalPages && totalPages > 0) currentPage = totalPages - 1;

            const start = currentPage * pageSize;
            const pageResults = filtered.slice(start, start + pageSize);

            // 4. Render only the current page
            pageResults.forEach((r) => {
                // Find original index for review modal
                const originalIdx = allResults.findIndex(orig => orig.timestamp === r.timestamp && orig.username === r.username);
                const pct = Math.round((r.score / r.total_marks) * 100) || 0;
                
                let badgeClass = 'score-low';
                if (pct >= 70) badgeClass = 'score-high';
                else if (pct >= 40) badgeClass = 'score-med';

                const tr = document.createElement('tr');
                const ts = new Date(r.timestamp);
                const dateStr = ts.toLocaleDateString([], { day: 'numeric', month: 'short', year: 'numeric' });
                const timeStr = ts.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                let studentTd = `<td><strong title="${r.username}">${r.username.length > 6 ? r.username.substring(0,6)+'...' : r.username}</strong></td>`;

                tr.innerHTML = `
                    <td>${dateStr}, ${timeStr}</td>
                    ${studentTd}
                    <td><strong>${r.topic}</strong></td>
                    <td><span class="score-badge ${badgeClass}">${r.score} / ${r.total_marks} (${pct}%)</span></td>
                    <td><button class="btn-view" onclick="openReview(${originalIdx})">Review</button></td>
                `;
                table.appendChild(tr);
            });

            // 5. Update Pagination UI
            document.getElementById('pageInfo').textContent = `Page ${currentPage + 1} of ${Math.max(1, totalPages)}`;
            document.getElementById('prevPageBtn').disabled = (currentPage === 0);
            document.getElementById('nextPageBtn').disabled = (currentPage >= totalPages - 1);
            document.getElementById('paginationControls').style.display = filtered.length > pageSize ? 'flex' : 'none';
        }
        async function openReview(idx) {
            const r = allResults[idx];
            
            // If this is an official exam with a paper_id, launch the full player in review mode
            const paperId = r.quiz_data ? r.quiz_data.paper_id : null;
            if (paperId) {
                // Check if the paper still exists on the server
                try {
                    const checkRes = await fetch(`/api/official-exams/check/${paperId}`);
                    const checkData = await checkRes.json();
                    if (checkData.exists) {
                        window.location.href = `official_exam_player.html?paper_id=${paperId}&mode=review&student=${r.username}`;
                        return;
                    }
                } catch (e) { console.error("Paper check failed", e); }
            }

            const modal = document.getElementById('reviewModal');
            const body = document.getElementById('modalBody');
            document.getElementById('modalTitle').textContent = `${r.username} - ${r.topic}`;
            body.innerHTML = '';
            
            if (Array.isArray(r.answers)) {
                r.answers.forEach(ans => {
                    const card = document.createElement('div');
                    card.className = 'review-q-card ' + (ans.is_correct === false ? 'wrong' : 'correct');
                    card.innerHTML = `<div class="q-text">Q: ${ans.question || ans.sub_id}</div><div class="ans-text">Answer: ${ans.user_answer || ans.answer || '(empty)'}</div><div class="fb-text">${ans.feedback || 'No feedback.'}</div>`;
                    body.appendChild(card);
                });
            } else {
                Object.entries(r.answers).forEach(([id, data]) => {
                    if (id === '_selections') return;
                    const card = document.createElement('div');
                    card.className = 'review-q-card';
                    card.innerHTML = `<div class="q-text">Question ${id}</div><div class="ans-text">Answer: ${data.answer || '(empty)'}</div><div class="fb-text">${data.feedback || 'Not graded.'}</div>`;
                    body.appendChild(card);
                });
            }
            modal.style.display = 'block';
        }

        function closeModal() { document.getElementById('reviewModal').style.display = 'none'; }
        window.onclick = (e) => { if (e.target == document.getElementById('reviewModal')) closeModal(); };
        loadResults();
    </script>
</body>
</html>
