<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExamQ Admin - User Management</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 1.1em; }
        
        .navbar {
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            background: white;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .nav-links { display: flex; align-items: center; }
        .nav-links a {
            text-decoration: none;
            color: #1e3c72;
            font-weight: 600;
            margin-left: 20px;
        }
        
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 5px;
        }
        .hamburger div {
            width: 25px;
            height: 3px;
            background-color: #1e3c72;
            border-radius: 2px;
        }

        @media (max-width: 850px) {
            .hamburger { display: flex; }
            .nav-links {
                display: none;
                width: 100%;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                background: white;
                padding: 20px;
                box-shadow: 0 10px 20px rgba(0,0,0,0.1);
                border-bottom: 1px solid #eee;
            }
            .nav-links.active { display: flex; }
            .nav-links a { margin: 10px 0; font-size: 1.1em; }
        }
        .content { padding: 40px; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f1f3f5; color: #1e3c72; font-weight: 700; }
        
        .role-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: 700;
            text-transform: uppercase;
        }
        .role-admin { background: #fce4ec; color: #d81b60; }
        .role-student { background: #e3f2fd; color: #1e88e5; }

        .btn-edit {
            background: #1e3c72;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
        }
        .modal-content {
            background: white;
            margin: 100px auto;
            max-width: 500px;
            border-radius: 15px;
            overflow: hidden;
        }
        .modal-header { padding: 20px; background: #f1f3f5; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; }
        .modal-body { padding: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="navbar">
            <div style="font-weight: 800; color: #1e3c72; font-size: 1.2em;">🎓 ExamQ Admin</div>
            <div class="hamburger" onclick="toggleMenu()">
                <div></div>
                <div></div>
                <div></div>
            </div>
            <div class="nav-links" id="navLinks">
                <span id="welcomeUser" style="margin-right: 15px; font-weight: 600; color: #1e3c72;"></span>
                <a href="/admin_exams.html" style="color:#d63384;">⚙️ Exams</a>
                <a href="/exam_questions.html">📖 Exam Library</a>
                <a href="/results">📊 Results</a>
                <a href="#" onclick="logout()">🚪 Logout</a>
            </div>
        </div>

        <div class="header">
            <h1>User Management</h1>
            <p>Monitor student progress and manage accounts.</p>
        </div>

        <div class="content">
            <h2 style="color: #1e3c72; margin-bottom: 20px;">System Users</h2>
            <table>
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Role</th>
                        <th>Joined</th>
                        <th>Quizzes Taken</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="userTableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit User</h3>
                <span style="cursor:pointer" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editOldUsername">
                <div class="form-group">
                    <label>New Username</label>
                    <input type="text" id="editUsername">
                </div>
                <div class="form-group">
                    <label>New Password (leave blank to keep current)</label>
                    <input type="password" id="editPassword">
                </div>
                <button class="btn-edit" style="width:100%; padding:15px;" onclick="saveUser()">Update User Details</button>
            </div>
        </div>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('navLinks').classList.toggle('active');
        }
        function logout() {
            localStorage.removeItem('quiz_username');
            localStorage.removeItem('quiz_admin_username');
            window.location.href = 'login.html';
        }

        async function loadUsers() {
            const admin_username = localStorage.getItem('quiz_admin_username');
            if (!admin_username) { window.location.href = 'login.html'; return; }
            
            const welcomeEl = document.getElementById('welcomeUser');
            const displayAdmin = admin_username.length > 6 ? admin_username.substring(0, 6) + '...' : admin_username;
            welcomeEl.textContent = '👤 ' + displayAdmin;
            welcomeEl.title = admin_username;

            const res = await fetch('/api/admin/users', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ admin_username })
            });
            const data = await res.json();
            if (data.success) {
                const tbody = document.getElementById('userTableBody');
                tbody.innerHTML = '';
                for (const [username, info] of Object.entries(data.users)) {
                    const tr = document.createElement('tr');
                    const joined = info.created_at ? new Date(info.created_at).toLocaleDateString() : '-';
                    const displayUser = username.length > 6 ? username.substring(0, 6) + '...' : username;
                    tr.innerHTML = `
                        <td><strong title="${username}">${displayUser}</strong></td>
                        <td><span class="role-badge role-${info.role}">${info.role}</span></td>
                        <td>${joined}</td>
                        <td>${info.quizzes_taken || 0}</td>
                        <td><button class="btn-edit" onclick="openEdit('${username}')">Edit</button></td>
                    `;
                    tbody.appendChild(tr);
                }
            }
        }

        function openEdit(u) {
            document.getElementById('editOldUsername').value = u;
            document.getElementById('editUsername').value = u;
            document.getElementById('editPassword').value = '';
            document.getElementById('editModal').style.display = 'block';
        }
        function closeModal() { document.getElementById('editModal').style.display = 'none'; }

        async function saveUser() {
            const admin_username = localStorage.getItem('quiz_admin_username');
            const old_username = document.getElementById('editOldUsername').value;
            const new_username = document.getElementById('editUsername').value;
            const new_password = document.getElementById('editPassword').value;

            const res = await fetch('/api/admin/update-user', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ admin_username, old_username, new_username, new_password })
            });
            if ((await res.json()).success) {
                closeModal();
                loadUsers();
            } else { alert("Update failed"); }
        }

        loadUsers();
    </script>
</body>
</html>
