<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Exam Library - Gallery</title>
    <script src="/static/theme_manager.js"></script>
    <script src="/static/online_status.js"></script>
    <style>
        :root {
            --primary-color: #1e3c72;
            --secondary-color: #2a5298;
            --main-gradient: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--main-gradient);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            overflow: hidden;
        }
        .header {
            background: var(--main-gradient);
            color: white;
            padding: 40px;
            text-align: center;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 1.1em; }
        .content { padding: 40px; }
        
        .navbar {
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            background: white;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .nav-brand { font-weight: 800; color: var(--primary-color); font-size: 1.2em; }
        .nav-links { display: flex; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--primary-color); font-weight: 600; margin-left: 20px; }
        
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 5px;
        }
        .hamburger div {
            width: 25px;
            height: 3px;
            background-color: var(--primary-color);
            border-radius: 2px;
        }

        @media (max-width: 850px) {
            .hamburger { display: flex; }
            .nav-links {
                display: none;
                width: 100%;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                background: white;
                padding: 20px;
                box-shadow: 0 10px 20px rgba(0,0,0,0.1);
                border-bottom: 1px solid #eee;
            }
            .nav-links.active { display: flex; }
            .nav-links a { margin: 10px 0; font-size: 1.1em; }
        }

        .subject-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            padding: 20px 0;
        }
        .subject-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .subject-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border-color: var(--primary-color);
            background: white;
        }
        .subject-icon { font-size: 4em; }
        .subject-name { font-size: 1.5em; font-weight: 800; color: var(--primary-color); }

        .paper-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }
        .paper-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #e0e0e0;
            transition: all 0.3s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: relative;
            overflow: visible;
        }
        .paper-title {
            font-size: 1em;
            color: #333;
            font-weight: 700;
            line-height: 1.4;
            min-height: 2.8em;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .paper-meta {
            color: #666;
            font-size: 0.85em;
            margin-bottom: 5px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 5px;
        }

        /* Unified Split Button */
        .split-btn {
            display: flex;
            margin-top: 10px;
            border-radius: 8px;
            overflow: hidden;
            background: #ffc107;
            text-decoration: none;
            transition: transform 0.2s;
        }
        .split-btn:hover { transform: translateY(-2px); }
        .split-btn .btn-main {
            flex: 1;
            padding: 10px;
            color: #333;
            text-align: center;
            font-weight: 700;
            text-decoration: none;
            border-right: 1px solid rgba(0,0,0,0.1);
        }
        .split-btn .btn-close {
            width: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(0,0,0,0.4);
            cursor: pointer;
            border: none;
            background: transparent;
            font-size: 18px;
            font-weight: bold;
        }
        .split-btn .btn-close:hover {
            background: rgba(0,0,0,0.1);
            color: #dc3545;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: 700;
            text-transform: uppercase;
        }
        .status-not-started { background: #e9ecef; color: #6c757d; }
        .status-started { background: #fff3cd; color: #856404; }
        .status-completed { background: #d4edda; color: #155724; }

        .last-accessed {
            font-size: 0.75em;
            color: #888;
            margin-top: 5px;
            font-style: italic;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .btn-start {
            background: var(--main-gradient);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-weight: 700;
            text-align: center;
            text-decoration: none;
            font-size: 0.9em;
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 700;
            cursor: pointer;
        }
        .search-container {
            max-width: 800px;
            margin: -30px auto 30px;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }
        .search-input {
            width: 100%;
            padding: 15px 25px;
            border-radius: 30px;
            border: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            font-size: 1.1em;
            outline: none;
            transition: all 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="navbar">
            <div class="nav-brand">🎓 ExamQ Exam Library</div>
            <div class="hamburger" onclick="toggleMenu()">
                <div></div>
                <div></div>
                <div></div>
            </div>
            <div class="nav-links" id="navLinks">
                <span id="welcomeUser" style="margin-right: 15px; font-weight: 600; color: var(--primary-color);"></span>
                <a href="/admin_users.html" id="usersLink" class="admin-only" style="display:none; color:#d63384;">⚙️ Users</a>
                <a href="/admin_exams.html" id="adminLink" class="admin-only" style="display:none; color:#d63384;">⚙️ Exams</a>
                <a href="/">🏠 Generator</a>
                <a href="/results">📊 Results</a>
                <a href="/games.html">🎮 Games</a>
                <a href="/settings.html">⚙️ Settings</a>
                <a href="#" onclick="logout()">🚪 Logout</a>
            </div>
        </div>

        <div class="header">
            <h1 id="mainTitle">Official Exam Library</h1>
            <p id="mainSubtitle">Select a subject to browse available papers</p>
        </div>

        <div class="search-container" id="searchContainer" style="display:none;">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search exams..." oninput="filterExams()">
        </div>

        <div class="content">
            <!-- 1. Resume Section -->
            <div id="resumeView" style="display:none; margin-bottom: 40px;">
                <h2 style="color: var(--primary-color); margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
                    ⏳ Continue Your Progress
                </h2>
                <div id="resumeGrid" class="paper-grid"></div>
                <div style="margin-top: 30px; border-bottom: 2px solid #eee;"></div>
            </div>

            <!-- 2. Subjects Grid (The core content) -->
            <div id="subjectView" class="subject-grid"></div>
            
            <!-- 3. Papers View (Hidden by default) -->
            <div id="paperView" style="display:none;">
                <span class="back-btn" onclick="showSubjects()">← Back to Subjects</span>
                <div id="examContent"></div>
            </div>

            <!-- 4. Student Progress (Admin Only - BOTTOM of page) -->
            <div id="adminProgressView" style="display:none; margin-top: 60px; border-top: 2px solid #eee; padding-top: 40px;">
                <h2 style="color: #d63384; margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
                    📈 Student Progress (Admin Only)
                </h2>
                <div style="background: #fff; border-radius: 15px; border: 1px solid #eee; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
                    <table style="width: 100%; border-collapse: collapse;">
                        <thead style="background: #f8f9fa; border-bottom: 2px solid #eee;">
                            <tr>
                                <th style="padding: 15px; text-align: left; color: #666; font-weight: 700;">Student</th>
                                <th style="padding: 15px; text-align: left; color: #666; font-weight: 700;">Exam Paper</th>
                                <th style="padding: 15px; text-align: left; color: #666; font-weight: 700;">Status</th>
                                <th style="padding: 15px; text-align: left; color: #666; font-weight: 700;">Last Activity</th>
                                <th style="padding: 15px; text-align: center; color: #666; font-weight: 700;">Action</th>
                            </tr>
                        </thead>
                        <tbody id="adminProgressTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('navLinks').classList.toggle('active');
        }
        let allExams = [];
        let allProgress = {};
        let currentSubject = null;

        function logout() {
            localStorage.removeItem('quiz_username');
            localStorage.removeItem('quiz_admin_username');
            window.location.href = 'login.html';
        }

        async function loadExams() {
            const username = localStorage.getItem('quiz_username') || localStorage.getItem('quiz_admin_username');
            const isAdmin = !!localStorage.getItem('quiz_admin_username');
            if (username) {
                const welcomeEl = document.getElementById('welcomeUser');
                const displayUser = username.length > 6 ? username.substring(0, 6) + '...' : username;
                if (welcomeEl) {
                    welcomeEl.textContent = '👤 ' + displayUser;
                    welcomeEl.title = username;
                }
                if (isAdmin) {
                    const al = document.getElementById('adminLink');
                    const ul = document.getElementById('usersLink');
                    if (al) al.style.display = 'inline';
                    if (ul) ul.style.display = 'inline';
                    // We call this but its display depends on showSubjects
                    loadAdminProgress();
                }
            }
            try {
                const [examRes, progRes] = await Promise.all([
                    fetch('/api/official-exams/list'),
                    fetch(`/api/student/exam-progress/list?username=${username}`)
                ]);
                allExams = (await examRes.json()).exams || [];
                allProgress = (await progRes.json()).progress || {};
                showSubjects();
            } catch (e) { console.error(e); }
        }

        async function loadAdminProgress() {
            const adminUser = localStorage.getItem('quiz_admin_username');
            if (!adminUser) return;
            try {
                const res = await fetch(`/api/admin/all-progress?username=${adminUser}`);
                const data = await res.json();
                if (data.success && data.all_progress.length > 0) {
                    const view = document.getElementById('adminProgressView');
                    const table = document.getElementById('adminProgressTable');
                    // Only show if we're on the subjects view
                    if (!currentSubject) view.style.display = 'block';
                    table.innerHTML = data.all_progress.map(p => {
                        const displayUser = p.username.length > 10 ? p.username.substring(0, 10) + '...' : p.username;
                        return `
                        <tr style="border-bottom: 1px solid #eee;">
                            <td style="padding: 12px 15px;"><strong title="${p.username}">${displayUser}</strong></td>
                            <td style="padding: 12px 15px;">${p.title}</td>
                            <td style="padding: 12px 15px;"><span class="status-badge status-started">${p.status.replace('_', ' ')}</span></td>
                            <td style="padding: 12px 15px; font-size: 0.85em; color: #666;">${formatLastAccessed(p.last_updated)}</td>
                            <td style="padding: 12px 15px; text-align: center;">
                                <a href="/official_exam_player.html?paper_id=${p.paper_id}&mode=review&student=${p.username}" 
                                   style="text-decoration: none; font-size: 1.2em; filter: grayscale(1); transition: filter 0.2s;" 
                                   onmouseover="this.style.filter='none'" onmouseout="this.style.filter='grayscale(1)'" 
                                   title="View Exam Paper">👁️</a>
                            </td>
                        </tr>
                    `;
                    }).join('');
                }
            } catch (e) { console.error("Failed to load admin progress", e); }
        }

        function showSubjects() {
            currentSubject = null;
            document.getElementById('subjectView').style.display = 'grid';
            document.getElementById('paperView').style.display = 'none';
            document.getElementById('searchContainer').style.display = 'none';
            document.getElementById('mainTitle').textContent = "Official Exam Library";
            document.getElementById('mainSubtitle').textContent = "Select a subject to browse available papers";
            
            // Handle admin view visibility
            const isAdmin = !!localStorage.getItem('quiz_admin_username');
            if (isAdmin) {
                document.getElementById('adminProgressView').style.display = 'block';
                loadAdminProgress();
            }

            const resumeContainer = document.getElementById('resumeView');
            const resumeGrid = document.getElementById('resumeGrid');
            const inProgress = allExams.filter(e => allProgress[e.id] && allProgress[e.id].status === 'in_progress');
            
            if (inProgress.length > 0) {
                resumeContainer.style.display = 'block';
                inProgress.sort((a,b) => new Date(allProgress[b.id].last_updated) - new Date(allProgress[a.id].last_updated));
                resumeGrid.innerHTML = inProgress.map(exam => {
                    const prog = allProgress[exam.id];
                    return `
                        <div class="paper-card" style="border-left: 5px solid #ffc107;" onclick="window.location.href='/official_exam_player.html?paper_id=${exam.id}'">
                            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                                <span style="background: var(--primary-color); color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.7em; font-weight: bold; text-transform: uppercase;">${exam.subject}</span>
                                <div class="status-badge status-started">In Progress</div>
                            </div>
                            <div class="paper-title">${exam.title}</div>
                            <div class="paper-meta">
                                <div style="font-weight: 700; color: #555; font-size: 0.85em;">${formatLongDate(exam.date)}</div>
                                <div class="last-accessed">🕒 ${formatLastAccessed(prog.last_updated)}</div>
                            </div>
                            <div class="split-btn">
                                <a href="/official_exam_player.html?paper_id=${exam.id}" class="btn-main">Continue →</a>
                                <div class="btn-close" onclick="deleteProgress(event, '${exam.id}')" title="Clear Progress">&times;</div>
                            </div>
                        </div>
                    `;
                }).join('');
            } else { resumeContainer.style.display = 'none'; }

            const grid = document.getElementById('subjectView');
            grid.innerHTML = '';
            const subjects = [...new Set(allExams.map(e => e.subject))].sort();
            subjects.forEach(s => {
                const count = allExams.filter(e => e.subject === s).length;
                let icon = '📖';
                if (s.toLowerCase().includes('biology')) icon = '🔬';
                else if (s.toLowerCase().includes('physics')) icon = '⚡';
                else if (s.toLowerCase().includes('math')) icon = '🔢';
                else if (s.toLowerCase().includes('english')) icon = '✍️';
                const card = document.createElement('div');
                card.className = 'subject-card';
                card.onclick = () => selectSubject(s);
                card.innerHTML = `<div class="subject-icon">${icon}</div><div class="subject-name">${s}</div><div style="color: #666;">${count} Exam Papers Available</div>`;
                grid.appendChild(card);
            });
        }

        async function deleteProgress(event, paperId) {
            event.stopPropagation();
            const btn = event.currentTarget.closest('.split-btn');
            const main = btn.querySelector('.btn-main');
            const close = btn.querySelector('.btn-close');
            if (btn.getAttribute('data-confirm') === 'true') {
                const username = localStorage.getItem('quiz_username') || localStorage.getItem('quiz_admin_username');
                const res = await fetch('/api/student/exam-progress/delete', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username, paper_id: paperId })
                });
                if ((await res.json()).success) {
                    // Update the local cache and re-render
                    delete allProgress[paperId];
                    showSubjects();
                }
            } else {
                btn.setAttribute('data-confirm', 'true');
                btn.style.background = '#dc3545';
                main.style.color = 'white'; main.textContent = 'Confirm Clear?';
                close.style.color = 'white'; close.style.background = 'rgba(0,0,0,0.2)';
                setTimeout(() => {
                    if (btn && btn.getAttribute('data-confirm') === 'true') {
                        btn.removeAttribute('data-confirm');
                        btn.style.background = ''; main.style.color = ''; main.textContent = 'Continue →';
                        close.style.color = ''; close.style.background = '';
                    }
                }, 3000);
            }
        }

        function selectSubject(s) {
            currentSubject = s;
            document.getElementById('subjectView').style.display = 'none';
            document.getElementById('adminProgressView').style.display = 'none'; // Hide at the bottom when in subject view
            document.getElementById('paperView').style.display = 'block';
            document.getElementById('searchContainer').style.display = 'block';
            document.getElementById('mainTitle').textContent = s + " Exam Library";
            document.getElementById('mainSubtitle').textContent = "Showing all available " + s + " papers";
            filterExams();
        }

        function filterExams() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allExams.filter(e => e.subject === currentSubject && (e.title.toLowerCase().includes(q) || e.date.toLowerCase().includes(q)));
            renderExams(filtered);
        }

        function parseExamDate(d) {
            if (!d || d === 'Unknown') return new Date(0);
            const months = {'jan':0,'feb':1,'mar':2,'apr':3,'may':4,'jun':5,'jul':6,'aug':7,'sep':8,'oct':9,'nov':10,'dec':11,
                           'january':0,'february':1,'march':2,'april':3,'may':4,'june':5,'july':6,'august':7,'september':8,'october':9,'november':10,'december':11};
            const parts = d.toLowerCase().split(/[\s,]+/);
            let y = parseInt(parts.find(p => p.match(/^\d{4}$/)));
            let m = parts.find(p => months[p] !== undefined);
            let day = parseInt(parts.find(p => p.match(/^\d{1,2}$/))) || 1;
            return (y && m) ? new Date(y, months[m], day) : new Date(0);
        }

        function formatLongDate(d) {
            const date = parseExamDate(d);
            return date.getTime() === 0 ? d : new Intl.DateTimeFormat('en-GB', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }).format(date);
        }

        function formatLastAccessed(iso) {
            if (!iso) return '';
            const d = new Date(iso.replace(' ', 'T') + (iso.includes('Z') ? '' : 'Z'));
            if (isNaN(d.getTime())) return '';
            const now = new Date(), t = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            return (d.toDateString() === now.toDateString()) ? `Today, ${t}` : `${d.toLocaleDateString([], { day: 'numeric', month: 'short' })}, ${t}`;
        }

        function renderExams(exams) {
            const content = document.getElementById('examContent');
            content.innerHTML = '';
            if (exams.length === 0) { content.innerHTML = '<div style="text-align: center; padding: 40px; color: #666;">No papers found.</div>'; return; }
            exams.sort((a,b) => parseExamDate(b.date) - parseExamDate(a.date));
            const grid = document.createElement('div');
            grid.className = 'paper-grid';
            grid.style.marginTop = '20px';
            grid.innerHTML = exams.map(exam => {
                const prog = allProgress[exam.id];
                let statusClass = 'status-not-started', statusText = 'Not Started', btnText = 'Start', lastAccessedHtml = '';
                if (prog) {
                    lastAccessedHtml = `<div class="last-accessed">🕒 ${formatLastAccessed(prog.last_updated)}</div>`;
                    if (prog.status === 'completed') { statusClass = 'status-completed'; statusText = 'Finished'; btnText = 'Review'; }
                    else { 
                        statusClass = 'status-started'; 
                        let left = Math.max(0, (exam.total_questions || 0) - (prog.current_question_idx || 0));
                        statusText = left > 0 ? `Resume (${left} left)` : 'Resume';
                        btnText = 'Continue';
                    }
                }
                return `
                    <div class="paper-card" onclick="window.location.href='/official_exam_player.html?paper_id=${exam.id}'">
                        <div class="paper-title">${exam.title}</div>
                        <div class="paper-meta">
                            <div style="font-weight: 700; color: var(--primary-color); font-size: 0.95em;">${formatLongDate(exam.date)}</div>
                            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center; margin-top: 5px;">
                                <span style="color: #666; font-size: 0.9em;">${exam.total_questions || 0} Questions</span>
                                <div class="status-badge ${statusClass}">${statusText}</div>
                            </div>
                            ${lastAccessedHtml}
                        </div>
                        <a href="/official_exam_player.html?paper_id=${exam.id}" class="btn-start">${btnText}</a>
                    </div>
                `;
            }).join('');
            content.appendChild(grid);
        }

        loadExams();
    </script>
</body>
</html>
