<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Exam Papers - Gallery</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 1.1em; }
        .content { padding: 40px; }
        .category-section { margin-bottom: 40px; }
        .category-title {
            font-size: 1.8em;
            color: #1e3c72;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #eee;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .paper-count-badge {
            background: #667eea;
            color: white;
            font-size: 0.5em;
            padding: 4px 12px;
            border-radius: 15px;
            vertical-align: middle;
        }
        .sub-group-title {
            font-size: 1.2em;
            color: #555;
            margin: 25px 0 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sub-group-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #eee;
        }
        .paper-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }
        .paper-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #e0e0e0;
            transition: all 0.3s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .paper-title {
            font-size: 1em;
            color: #333;
            font-weight: 700;
            line-height: 1.4;
            min-height: 2.8em;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .paper-meta {
            color: #666;
            font-size: 0.85em;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-start {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-weight: 700;
            text-align: center;
            text-decoration: none;
            font-size: 0.9em;
        }
        .navbar {
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
        }
        .nav-links a {
            text-decoration: none;
            color: #1e3c72;
            font-weight: 600;
            margin-left: 20px;
        }
        .search-container {
            max-width: 800px;
            margin: -30px auto 30px;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }
        .search-input {
            width: 100%;
            padding: 15px 25px;
            border-radius: 30px;
            border: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            font-size: 1.1em;
            outline: none;
            transition: all 0.3s;
        }
        .search-input:focus {
            box-shadow: 0 10px 30px rgba(30, 60, 114, 0.25);
            transform: translateY(-2px);
        }
        
        .subject-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .subject-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border-color: #1e3c72;
            background: white;
        }
        .subject-icon {
            font-size: 4em;
        }
        .subject-name {
            font-size: 1.5em;
            font-weight: 800;
            color: #1e3c72;
        }
        .subject-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            padding: 20px 0;
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: #1e3c72;
            text-decoration: none;
            font-weight: 700;
            cursor: pointer;
        }
        .status-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: 700;
            text-transform: uppercase;
        }
        .status-not-started { background: #e9ecef; color: #6c757d; }
        .status-started { background: #fff3cd; color: #856404; }
        .status-completed { background: #d4edda; color: #155724; }

        .last-accessed {
            font-size: 0.75em;
            color: #888;
            margin-top: 5px;
            font-style: italic;
            display: flex;
            align-items: center;
            gap: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="navbar">
            <div style="font-weight: 800; color: #1e3c72; font-size: 1.2em;">🎓 ExamQ Papers</div>
            <div class="nav-links">
                <span id="welcomeUser" style="margin-right: 15px; font-weight: 600; color: #1e3c72;"></span>
                <a href="/admin_users.html" id="usersLink" class="admin-only" style="display:none; color:#d63384;">⚙️ Users</a>
                <a href="/admin_exams.html" id="adminLink" class="admin-only" style="display:none; color:#d63384;">⚙️ Exams</a>
                <a href="/">🏠 Generator</a>
                <a href="/results">📊 Results</a>
                <a href="#" onclick="logout()">🚪 Logout</a>
            </div>
        </div>

        <div class="header">
            <h1 id="mainTitle">Official Exam Papers</h1>
            <p id="mainSubtitle">Select a subject to browse available papers</p>
        </div>

        <div class="search-container" id="searchContainer" style="display:none;">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search exams..." oninput="filterExams()">
        </div>

        <div class="content">
            <div id="subjectView" class="subject-grid">
                <!-- Subjects will be injected here -->
            </div>
            
            <div id="paperView" style="display:none;">
                <span class="back-btn" onclick="showSubjects()">← Back to Subjects</span>
                <div id="examContent"></div>
            </div>
        </div>
    </div>

    <script>
        let allExams = [];
        let allProgress = {};
        let currentSubject = null;

        function logout() {
            localStorage.removeItem('quiz_username');
            localStorage.removeItem('quiz_admin_username');
            window.location.href = 'login.html';
        }

        function parseExamDate(dateStr) {
            if (!dateStr || dateStr === 'Unknown') return new Date(0);
            const months = {
                'jan': 0, 'feb': 1, 'mar': 2, 'apr': 3, 'may': 4, 'jun': 5,
                'jul': 6, 'aug': 7, 'sep': 8, 'oct': 9, 'nov': 10, 'dec': 11,
                'january': 0, 'february': 1, 'march': 2, 'april': 3, 'may': 4, 'june': 5,
                'july': 6, 'august': 7, 'september': 8, 'october': 9, 'november': 10, 'december': 11
            };
            const parts = dateStr.toLowerCase().split(/[\s,]+/);

            const year = parseInt(parts.find(p => p.match(/^\d{4}$/)));
            const monthName = parts.find(p => months[p] !== undefined);
            const day = parseInt(parts.find(p => p.match(/^\d{1,2}$/))) || 1;

            if (year && monthName) {
                return new Date(year, months[monthName], day);
            }
            return new Date(0);
        }


        async function loadExams() {
            const username = localStorage.getItem('quiz_username') || localStorage.getItem('quiz_admin_username');
            const isAdmin = !!localStorage.getItem('quiz_admin_username');
            
            if (username) {
                const welcomeEl = document.getElementById('welcomeUser');
                if (welcomeEl) welcomeEl.textContent = '👤 ' + username;
                if (isAdmin) {
                    document.getElementById('adminLink').style.display = 'inline';
                    document.getElementById('usersLink').style.display = 'inline';
                }
            }

            try {
                const [examRes, progRes] = await Promise.all([
                    fetch('/api/official-exams/list'),
                    fetch(`/api/student/exam-progress/list?username=${username}`)
                ]);
                
                const examData = await examRes.json();
                const progData = await progRes.json();
                
                allExams = examData.exams || [];
                allProgress = progData.progress || {};
                
                showSubjects();

            } catch (error) {
                console.error("Failed to load:", error);
            }
        }

        function showSubjects() {
            currentSubject = null;
            document.getElementById('subjectView').style.display = 'grid';
            document.getElementById('paperView').style.display = 'none';
            document.getElementById('searchContainer').style.display = 'none';
            document.getElementById('mainTitle').textContent = "Official Exam Papers";
            document.getElementById('mainSubtitle').textContent = "Select a subject to browse available papers";

            const subjects = [...new Set(allExams.map(e => e.subject))].sort();
            const grid = document.getElementById('subjectView');
            grid.innerHTML = '';

            subjects.forEach(s => {
                const count = allExams.filter(e => e.subject === s).length;
                let icon = '📖';
                if (s.toLowerCase().includes('biology')) icon = '🔬';
                else if (s.toLowerCase().includes('physics')) icon = '⚡';
                else if (s.toLowerCase().includes('math')) icon = '🔢';
                else if (s.toLowerCase().includes('english')) icon = '✍️';

                const card = document.createElement('div');
                card.className = 'subject-card';
                card.onclick = () => selectSubject(s);
                card.innerHTML = `
                    <div class="subject-icon">${icon}</div>
                    <div class="subject-name">${s}</div>
                    <div style="color: #666;">${count} Papers Available</div>
                `;
                grid.appendChild(card);
            });
        }

        function selectSubject(subject) {
            currentSubject = subject;
            document.getElementById('subjectView').style.display = 'none';
            document.getElementById('paperView').style.display = 'block';
            document.getElementById('searchContainer').style.display = 'block';
            document.getElementById('mainTitle').textContent = subject + " Papers";
            document.getElementById('mainSubtitle').textContent = `Showing all categorized ${subject} papers`;
            
            filterExams();
        }

        function filterExams() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allExams.filter(exam => 
                exam.subject === currentSubject && (
                    exam.title.toLowerCase().includes(query) || 
                    exam.date.toLowerCase().includes(query) ||
                    exam.paper.toLowerCase().includes(query)
                )
            );
            renderExams(filtered);
        }

        function formatLongDate(dateStr) {
            if (!dateStr || dateStr === 'Unknown') return dateStr;
            const months = {
                'jan': 0, 'feb': 1, 'mar': 2, 'apr': 3, 'may': 4, 'jun': 5,
                'jul': 6, 'aug': 7, 'sep': 8, 'oct': 9, 'nov': 10, 'dec': 11,
                'january': 0, 'february': 1, 'march': 2, 'april': 3, 'may': 4, 'june': 5,
                'july': 6, 'august': 7, 'september': 8, 'october': 9, 'november': 10, 'december': 11
            };
            const parts = dateStr.toLowerCase().split(/[\s,]+/);
            let date = null;
            
            if (parts.length >= 2) {
                const year = parseInt(parts.find(p => p.match(/^\d{4}$/)));
                const monthName = parts.find(p => months[p] !== undefined);
                const day = parseInt(parts.find(p => p.match(/^\d{1,2}$/))) || 1;
                
                if (year && monthName) {
                    date = new Date(year, months[monthName], day);
                }
            }

            if (date && !isNaN(date.getTime())) {
                return new Intl.DateTimeFormat('en-GB', { 
                    weekday: 'long', 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric' 
                }).format(date);
            }
            return dateStr;
        }

        function formatLastAccessed(isoStr) {
            if (!isoStr) return '';
            // SQLite timestamp is UTC
            const date = new Date(isoStr.replace(' ', 'T') + (isoStr.includes('Z') ? '' : 'Z'));
            if (isNaN(date.getTime())) return '';

            const now = new Date();
            const isToday = date.toDateString() === now.toDateString();
            
            const timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            if (isToday) {
                return `Last accessed: Today, ${timeStr}`;
            } else {
                const dateStr = date.toLocaleDateString([], { day: 'numeric', month: 'short' });
                return `Last accessed: ${dateStr}, ${timeStr}`;
            }
        }

        function renderExams(exams) {
            const content = document.getElementById('examContent');
            content.innerHTML = '';

            if (exams.length === 0) {
                content.innerHTML = '<div style="text-align: center; padding: 40px; color: #666;">No papers found.</div>';
                return;
            }

            // Sort all exams by date descending (Newest first)
            exams.sort((a, b) => {
                const dateA = parseExamDate(a.date);
                const dateB = parseExamDate(b.date);
                return dateB - dateA;
            });

            const grid = document.createElement('div');
            grid.className = 'paper-grid';
            grid.style.marginTop = '20px';
            
            grid.innerHTML = exams.map(exam => {
                const prog = allProgress[exam.id];
                let statusClass = 'status-not-started';
                let statusText = 'Not Started';
                let btnText = 'Start';
                let lastAccessedHtml = '';

                if (prog) {
                    lastAccessedHtml = `<div class="last-accessed">🕒 ${formatLastAccessed(prog.last_updated)}</div>`;
                    if (prog.status === 'completed') {
                        statusClass = 'status-completed';
                        statusText = 'Finished';
                        btnText = 'Review';
                    } else {
                        statusClass = 'status-started';
                        let left = Math.max(0, (exam.total_questions || 0) - (prog.current_question_idx || 0));
                        statusText = left > 0 ? `Resume (${left} questions left)` : 'Resume';                        btnText = 'Continue';
                    }
                }

                return `
                    <div class="paper-card" onclick="window.location.href='/official_exam_player.html?paper_id=${exam.id}'">
                        <div class="paper-title">${exam.title}</div>
                        <div class="paper-meta" style="flex-direction: column; align-items: flex-start; gap: 5px;">
                            <div style="font-weight: 700; color: #1e3c72; font-size: 0.95em;">${formatLongDate(exam.date)}</div>
                            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center; margin-top: 5px;">
                                <span style="color: #666; font-size: 0.9em;">${exam.total_questions || 0} Questions</span>
                                <div class="status-badge ${statusClass}" style="margin-top:0;">${statusText}</div>
                            </div>
                            ${lastAccessedHtml}
                        </div>
                        <a href="/official_exam_player.html?paper_id=${exam.id}" class="btn-start">${btnText}</a>
                    </div>
                `;
            }).join('');
            
            content.appendChild(grid);
        }

        loadExams();
    </script>
</body>
</html>
