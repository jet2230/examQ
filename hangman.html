<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExamQ - Hangman</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="/static/theme_manager.js"></script>
    <script src="/static/online_status.js"></script>
    <style>
        :root { --primary-color: #1e3c72; --secondary-color: #2a5298; --main-gradient: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--main-gradient); min-height: 100vh; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); overflow: hidden; display: flex; flex-direction: column; position: relative; }
        .header { background: #f8f9fa; padding: 20px 40px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .content { padding: 40px; text-align: center; }
        .hangman-drawing { width: 250px; height: 250px; margin: 0 auto 30px; display: block; border-radius: 15px; overflow: hidden; background: #fdfdfd; box-shadow: inset 0 0 20px rgba(0,0,0,0.05); }
        .word-display { font-size: 2.2em; font-family: monospace; margin-bottom: 30px; color: var(--primary-color); font-weight: 800; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px 8px; }
        .word-char { min-width: 0.8em; text-align: center; display: inline-block; }
        .peek-highlight { background-color: #ffeb3b; border-radius: 4px; padding: 0 4px; color: #000; }
        .word-space { color: #ccc; margin: 0 10px; }
        .keyboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(40px, 1fr)); gap: 10px; max-width: 600px; margin: 0 auto; }
        .keyboard.not-my-turn { filter: grayscale(0.8); opacity: 0.6; pointer-events: none; }
        .key { padding: 10px; background: #eee; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; font-weight: 700; transition: all 0.2s; }
        .key.used { opacity: 0.3; cursor: not-allowed; }
        .key.correct { background: #d4edda; color: #155724; border-color: #c3e6cb; }
        .key.wrong { background: #f8d7da; color: #721c24; border-color: #f5c6cb; }
        .players-panel { margin-top: 30px; padding: 20px; background: #f1f4f9; border-radius: 15px; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .player-chip { padding: 5px 15px; background: white; border-radius: 20px; font-size: 0.85em; border: 1px solid #ddd; display: flex; align-items: center; gap: 8px; }
        .player-chip.active-turn { border-color: #28a745; background: #e8f5e9; box-shadow: 0 0 10px rgba(40,167,69,0.2); }
        #gameOverlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 100; flex-direction: column; justify-content: center; align-items: center; }
        .overlay-title { font-size: 3em; font-weight: 800; margin-bottom: 20px; }
        .btn-action { background: var(--main-gradient); color: white; border: none; padding: 12px 30px; border-radius: 8px; font-weight: 700; cursor: pointer; text-decoration: none; margin-top: 20px; }
        .user-card { padding: 8px 12px; border: 1px solid #eee; border-radius: 8px; cursor: pointer; font-size: 0.8em; display: flex; align-items: center; gap: 8px; background: #fdfdfd; }
        .user-card.selected { background: #e3f2fd; border-color: #1e3c72; border-width: 2px; }
        .switch input:checked + .slider { background-color: #28a745; }
        .slider { background-color: #ccc; position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
        .switch input:checked + .slider:before { transform: translateX(20px); }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div><h2 style="color: var(--primary-color);">Multiplayer Hangman</h2><div id="gameStatus" style="font-size: 0.8em; color: #666;">Initializing...</div></div>
            <button id="restartBtn" class="btn-action" style="background:#ffc107; color:#000; margin:0; padding:8px 15px; font-size:0.8em; display:none;" onclick="resetGame()">🔄 Change Word</button>
        </div>
        <div class="content">
            <div id="lobbyView" style="display:none;">
                <div id="hostControls" style="display:none;">
                    <h3 style="margin-bottom:20px;">Lobby: You are the Host</h3>
                    <input type="text" id="secretWordInput" maxlength="255" style="padding:12px; border-radius:8px; border:1px solid #ddd; margin-bottom:15px; width:100%; max-width:500px; text-transform:uppercase;" placeholder="ENTER SECRET WORD">
                    <div style="margin-bottom:20px; display:flex; align-items:center; justify-content:center; gap:10px;">
                        <label class="switch" style="position:relative; display:inline-block; width:40px; height:20px;"><input type="checkbox" id="allowNumbersToggle" style="opacity:0; width:0; height:0;"><span class="slider"></span></label>
                        <span style="font-size:0.9em; color:#666;">Allow Numbers</span>
                    </div>
                    <button id="startBtn" class="btn-action" onclick="startGame()">Start Game</button>
                </div>
                <div id="guestWait" style="display:none;"><h3>Waiting for Host...</h3><div id="restartNotice" style="display:none; margin-top:15px; padding:15px; background:#fff3cd; border-radius:10px;">🔄 Waiting for the host to change the guess word</div></div>
                <div class="players-panel" id="lobbyPlayers"></div>
                <div id="hostInviteArea" style="display:none; margin-top:30px; padding:20px; background:#fff; border:1px solid #eee; border-radius:15px;">
                    <h4 style="margin-bottom:15px;">Invite Players</h4><div id="inviteUserList" style="max-height:150px; overflow-y:auto; display:grid; grid-template-columns:repeat(auto-fill, minmax(120px, 1fr)); gap:10px; margin-bottom:15px;"></div>
                    <button class="btn-action" style="width:100%; margin:0;" onclick="sendInvites()">Send Invitations</button>
                </div>
            </div>
            <div id="gameView" style="display:none;">
                <div class="hangman-drawing" id="hangman3dContainer"></div>
                <div id="timerDisplay" style="font-size: 1.4em; font-weight: 800; color: #dc3545; margin-bottom: 20px; display: none;">⏱️ <span id="timerSeconds">60</span>s</div>
                <div id="wordContainer" class="word-display"></div>
                <div id="clueDisplay" style="display:none; margin-bottom:20px; padding:15px; background:#f8f9fa; border-radius:12px; border:1px solid #ddd; text-align:left; max-height:120px; overflow-y:auto;"></div>
                <div id="clueControls" style="margin-bottom:20px; display:flex; flex-direction:column; align-items:center; gap:10px;">
                    <button id="requestClueBtn" class="btn-action" style="background:#6c757d; margin:0; padding:8px 15px; font-size:0.8em;" onclick="requestClue()">💡 Request Clue</button>
                    <div id="hostClueBox" style="display:none; gap:10px; align-items:center;">
                        <button class="btn-action" style="background:#6c757d; margin:0; padding:8px 15px; font-size:0.8em;" onpointerdown="showPeek()" onpointerup="hidePeek()" onpointerleave="hidePeek()">👁️ Peek</button>
                        <input type="text" id="clueInput" placeholder="Enter clue..." style="padding:8px; border-radius:5px; border:1px solid #ddd; width:150px;">
                        <button class="btn-action" style="background:#1e3c72; margin:0; padding:8px 15px; font-size:0.8em;" onclick="sendClue()">Send</button>
                    </div>
                </div>
                <div id="keyboard" class="keyboard"></div>
                <div id="gamePlayers" class="players-panel"></div>
            </div>
            <div id="gameOverlay">
                <div class="overlay-title" id="overlayTitle">GAME OVER</div>
                <p id="overlayMessage" style="font-size: 1.2em; color: #666; margin-bottom:20px;"></p>
                <div id="overlayPlayerList" style="margin-bottom:20px; padding:15px; background:#f1f4f9; border-radius:12px; font-size:0.9em; width:100%; max-width:400px;"></div>
                <div style="display:flex; gap:15px;"><button id="playAgainBtn" class="btn-action" style="background:#28a745; display:none;" onclick="resetGame()">🎮 Play Again</button><button class="btn-action" style="background:#6c757d;" onclick="leaveGame()">🚪 Quit Game</button></div>
            </div>
            <div style="margin-top:40px; padding-top:20px; border-top:1px solid #eee;"><button class="btn-action" style="background:#dc3545; margin:0; padding:10px 20px; font-size:0.9em;" onclick="leaveGame()">🚪 Leave Game</button></div>
            <div id="processingOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.7); z-index:2000; justify-content:center; align-items:center; flex-direction:column;">
                <div style="width:50px; height:50px; border:5px solid #f3f3f3; border-top:5px solid var(--primary-color); border-radius:50%; animation: spin 1s linear infinite;"></div>
                <div style="margin-top:15px; font-weight:700; color:var(--primary-color);">Processing...</div>
            </div>
        </div>
    </div>
    <!-- END_OF_CHUNK_1 -->
    <script>
        const urlParams = new URLSearchParams(window.location.search), sessionId = urlParams.get('id'), username = (localStorage.getItem('quiz_username') || localStorage.getItem('quiz_admin_username') || '').trim();
        let session = null, pollInterval = null, isUpdating = false, overlayTimeout = null;
        let confettiShown = false; // Add this flag
        let scene, camera, renderer, hangmanGroup, bodyParts = [], isSwinging = false, isWonState = false, swingAngle = 0, gameTime = 0;

        function init3D() {
            const container = document.getElementById('hangman3dContainer'); if (!container) return;
            scene = new THREE.Scene(); scene.background = new THREE.Color(0xfdfdfd);
            camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000); camera.position.set(25, 20, 45); camera.lookAt(0, 12, 0);
            renderer = new THREE.WebGLRenderer({ antialias: true }); renderer.setSize(250, 250); container.appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 0.7)); const sun = new THREE.DirectionalLight(0xffffff, 0.5); sun.position.set(20, 40, 30); scene.add(sun);
            const wood = new THREE.MeshLambertMaterial({ color: 0x795548 }), skin = new THREE.MeshLambertMaterial({ color: 0xffe0bd }), cloth = new THREE.MeshLambertMaterial({ color: 0x2c3e50 });
            const gallows = new THREE.Group(); gallows.add(new THREE.Mesh(new THREE.BoxGeometry(20, 1, 10), wood));
            const p = new THREE.Mesh(new THREE.BoxGeometry(1.5, 25, 1.5), wood); p.position.set(-6, 12.5, 0); gallows.add(p);
            const b = new THREE.Mesh(new THREE.BoxGeometry(12, 1.5, 1.5), wood); b.position.set(-0.5, 25, 0); gallows.add(b);
            const r = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 4), new THREE.MeshLambertMaterial({ color: 0xd7ccc8 })); r.position.set(4, 23, 0); gallows.add(r);
            scene.add(gallows); hangmanGroup = new THREE.Group(); hangmanGroup.position.set(4, 21, 0); scene.add(hangmanGroup);
            const head = new THREE.Mesh(new THREE.SphereGeometry(2, 32, 32), skin); head.position.y = -2;
            const body = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 1.5, 5), cloth); body.position.y = -5.5;
            const la = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 4), skin); la.position.set(-2.2, -4.5, 0); la.rotation.z = Math.PI/4;
            const ra = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 4), skin); ra.position.set(2.2, -4.5, 0); ra.rotation.z = -Math.PI/4;
            const ll = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 5), cloth); ll.position.set(-1, -10, 0);
            const rl = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 5), cloth); rl.position.set(1, -10, 0);
            bodyParts = [head, body, la, ra, ll, rl]; 
            bodyParts.forEach(bp => { 
                bp.visible = false; 
                bp.userData.origRot = bp.rotation.clone();
                bp.userData.origPos = bp.position.clone();
                hangmanGroup.add(bp); 
            });

            let raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2(), draggedPart = null;
            container.addEventListener('pointerdown', (e) => {
                const rect = container.getBoundingClientRect();
                mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(bodyParts.filter(p => p.visible));
                if (intersects.length > 0) draggedPart = intersects[0].object;
            });
            window.addEventListener('pointermove', (e) => {
                if (!draggedPart) return;
                const rect = container.getBoundingClientRect();
                const newX = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                const newY = -((e.clientY - rect.top) / rect.height) * 2 + 1;
                draggedPart.rotation.z += (newX - mouse.x) * 2;
                draggedPart.rotation.x -= (newY - mouse.y) * 2;
                draggedPart.position.x += (newX - mouse.x) * 5;
                mouse.set(newX, newY);
            });
            window.addEventListener('pointerup', () => draggedPart = null);

            function animate() { 
                requestAnimationFrame(animate); 
                gameTime += 0.03; 
                
                // Springy return logic for body parts
                bodyParts.forEach(p => {
                    if (p !== draggedPart) {
                        p.rotation.x += (p.userData.origRot.x - p.rotation.x) * 0.1;
                        p.rotation.y += (p.userData.origRot.y - p.rotation.y) * 0.1;
                        p.rotation.z += (p.userData.origRot.z - p.rotation.z) * 0.1;
                        p.position.x += (p.userData.origPos.x - p.position.x) * 0.1;
                        p.position.y += (p.userData.origPos.y - p.position.y) * 0.1;
                    }
                });

                if (isSwinging) { 
                    swingAngle += 0.05; 
                    hangmanGroup.rotation.z = Math.sin(swingAngle)*0.15; 
                } else if (bodyParts[1].visible) hangmanGroup.position.y = 21 + Math.sin(gameTime)*0.02; 
                
                // Slow rotation during play, faster when won
                const orbitSpeed = isWonState ? 0.2 : 0.05;
                const radius = 45;
                camera.position.x = Math.cos(gameTime * orbitSpeed) * radius;
                camera.position.z = Math.sin(gameTime * orbitSpeed) * radius;
                camera.lookAt(0, 12, 0);
                
                renderer.render(scene, camera); 
            }
            animate();
        }
        function update3D(w, lost, won) { bodyParts.forEach((bp, i) => bp.visible = i < w); isSwinging = lost; isWonState = won; }

        async function init() {
            if (!sessionId || !username) { location.href = 'games.html'; return; }
            init3D(); await fetch('/api/games/respond', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ session_id: sessionId, username, action: 'accept' }) });
            await fetchSession(true); pollInterval = setInterval(() => fetchSession(false), 2000);
        }
        async function fetchSession(force = false) {
            try {
                const res = await fetch(`/api/games/session/${sessionId}?t=${Date.now()}`);
                if (res.status === 404) { clearInterval(pollInterval); location.href = 'games.html'; return; }
                const data = await res.json();
                if (data.success) {
                    const sc = !session || data.session.status !== session.status, vc = !session || data.session.version > session.version, pc = !session || JSON.stringify(data.session.players) !== JSON.stringify(session.players);
                    if (force || sc || vc || pc) { session = data.session; updateUI(); }
                }
            } catch (e) { console.error(e); }
        }
        // --- END_OF_CHUNK_2 ---
        function updateUI() {
            if (!session) return; const acc = session.players.filter(p => p.status === 'accepted'), isH = session.host?.toLowerCase() === username.toLowerCase();
            
            // Show Change Word button for host during active game
            document.getElementById('restartBtn').style.display = (isH && session.status === 'active') ? 'block' : 'none';
            
            // Hide overlay by default unless finished
            if (session.status !== 'finished') {
                document.getElementById('gameOverlay').style.display = 'none';
            } else {
                // Update overlay player list dynamically while showing
                const listEl = document.getElementById('overlayPlayerList');
                if (listEl) {
                    listEl.innerHTML = `<div style="font-weight:bold; margin-bottom:10px; color:var(--primary-color);">Players waiting (${acc.length}):</div>` + 
                        acc.map(p => `<span>${p.username}${p.username.toLowerCase() === session.host.toLowerCase() ? ' (Host)' : ''}</span>`).join(', ');
                }
            }
            if (session.status === 'pending') {
                confettiShown = false; // Reset ONLY when back in lobby
                document.getElementById('lobbyView').style.display = 'block'; document.getElementById('gameView').style.display = 'none';
                
                // Accessible to ALL users
                document.getElementById('hostInviteArea').style.display = 'block';
                loadInvites();

                if (isH) { document.getElementById('hostControls').style.display = 'block'; document.getElementById('guestWait').style.display = 'none'; }
                else {
                    document.getElementById('hostControls').style.display = 'none'; document.getElementById('guestWait').style.display = 'block';
                    document.getElementById('restartNotice').style.display = (session.state?.restarting) ? 'block' : 'none';
                }
                document.getElementById('lobbyPlayers').innerHTML = acc.map(p => {
                    const disp = p.username.length > 10 ? p.username.substring(0,10) + '...' : p.username;
                    const isPHost = p.username && session.host && p.username.toLowerCase() === session.host.toLowerCase();
                    const removeBtn = (isH && !isPHost) ? `<button onclick="removePlayer('${p.username}')" style="background:none; border:none; color:#dc3545; cursor:pointer; font-weight:bold; margin-left:5px; padding:0 5px;" title="Remove Player">&times;</button>` : '';
                    return `<div class="player-chip"><strong>${disp}</strong>${isPHost ? ' (H)' : ''}${removeBtn}</div>`;
                }).join('');
                
                if (isH) { 
                    const wordInput = document.getElementById('secretWordInput');
                    if (!wordInput.oninput) wordInput.oninput = () => updateUI();
                    const word = wordInput.value.trim(), btn = document.getElementById('startBtn');
                    if (acc.length < 2) { btn.disabled = true; btn.textContent = "Wait for players..."; }
                    else if (word.length < 3) { btn.disabled = true; btn.textContent = "Enter word"; }
                    else { btn.disabled = false; btn.textContent = "Start Game"; }
                }
            } else { document.getElementById('lobbyView').style.display = 'none'; document.getElementById('gameView').style.display = 'block'; renderActive(); if (session.status === 'finished') showGameOver(); else document.getElementById('gameOverlay').style.display = 'none'; }
        }
        function renderActive() {
            const s = session.state; if (!s) return; const isMyT = s.currentTurn?.toLowerCase() === username.toLowerCase(), isH = session.host?.toLowerCase() === username.toLowerCase();
            document.getElementById('gameStatus').textContent = isMyT ? "YOUR TURN!" : `Waiting for ${s.currentTurn}...`;
            const isW = s.word.split('').every(c => c === ' ' || s.guessedLetters.some(l => l.toUpperCase() === c.toUpperCase()));
            document.getElementById('wordContainer').innerHTML = s.word.split('').map(c => {
                if (c === ' ') return '<span class="word-space">/</span>';
                const g = s.guessedLetters.some(l => l.toUpperCase() === c.toUpperCase());
                return `<span class="word-char${isPeeking && !g ? ' peek-highlight' : ''}">${(g || (isPeeking && !g)) ? c : (/[0-9]/.test(c) && s.allowNumbers ? '#' : '_')}</span>`;
            }).join('');
            if (s.turnStartedAt) {
                document.getElementById('timerDisplay').style.display = 'block';
                const start = s.turnStartedAt; if (lastTurnAt !== start) {
                    lastTurnAt = start; if (turnTimer) clearInterval(turnTimer);
                    turnTimer = setInterval(() => {
                        const rem = Math.max(0, 60 - Math.floor((Date.now()-start)/1000));
                        document.getElementById('timerSeconds').textContent = rem;
                        if (rem <= 0 && isMyT && !isUpdating) { clearInterval(turnTimer); makeGuess(null); }
                    }, 1000);
                }
            } else document.getElementById('timerDisplay').style.display = 'none';
            document.getElementById('clueDisplay').style.display = s.clueStack?.length ? 'block' : 'none';
            document.getElementById('clueDisplay').innerHTML = (s.clueStack || []).map(i => i.type === 'request' ? `<div>🙋 ${i.user} requested a clue</div>` : `<div>💡 Clue: <strong>${i.text}</strong></div>`).join('');
            document.getElementById('requestClueBtn').style.display = isH ? 'none' : 'block';
            if (!isH) { const req = s.cluesRequestedBy?.includes(username); document.getElementById('requestClueBtn').disabled = req; document.getElementById('requestClueBtn').style.opacity = req ? '0.5' : '1'; }
            document.getElementById('hostClueBox').style.display = isH ? 'flex' : 'none';
            const kb = document.getElementById('keyboard'); kb.innerHTML = ''; kb.className = 'keyboard' + (!isMyT ? ' not-my-turn' : '');
            let abc = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'; 
            // Only show numbers if allowed AND word contains numbers
            if (s.allowNumbers && /[0-9]/.test(s.word)) abc += '0123456789';
            abc.split('').forEach(l => {
                const btn = document.createElement('button'); btn.className = 'key'; btn.textContent = l; btn.setAttribute('data-key', l);
                const g = s.guessedLetters.some(x => x.toUpperCase() === l);
                if (g) { btn.classList.add('used', s.word.toUpperCase().includes(l) ? 'correct' : 'wrong'); btn.disabled = true; }
                else if (!isMyT) btn.disabled = true;
                kb.appendChild(btn);
            });
            update3D(s.wrongGuesses, s.wrongGuesses >= 6, isW);
            document.getElementById('gamePlayers').innerHTML = session.players.filter(p => p.status === 'accepted').map(p => `<div class="player-chip ${p.username === s.currentTurn ? 'active-turn' : ''}"><strong>${p.username}</strong>${p.username.toLowerCase() === session.host.toLowerCase() ? ' (H)' : ''}</div>`).join('');
        }
        async function startGame() { 
            const wordInput = document.getElementById('secretWordInput');
            const w = wordInput.value.trim().toUpperCase(); 
            if (w.length < 3) return; 
            
            const n = document.getElementById('allowNumbersToggle').checked;
            
            // Validation: No numbers if toggle is off
            if (!n && /[0-9]/.test(w)) {
                alert("The secret word contains numbers, but 'Allow Numbers' is turned off. Please remove the numbers or enable the toggle.");
                return;
            }

            const acc = session.players.filter(p => p.status === 'accepted'), 
                  g = acc.filter(p => p.username.toLowerCase() !== session.host.toLowerCase()); 
            
            await updateState({ 
                word: w, 
                guessedLetters: [], 
                wrongGuesses: 0, 
                currentTurn: g.length ? g[0].username : session.host, 
                playersOrder: acc.map(p => p.username), 
                allowNumbers: n, 
                turnStartedAt: Date.now(), 
                updatedAt: Date.now() 
            }, 'active'); 
        }
        async function makeGuess(l) { if (isUpdating || (l !== null && session.state.currentTurn.toLowerCase() !== username.toLowerCase())) return; isUpdating = true; await perform('GUESS', { letter: l }); }
        async function requestClue() { if (isUpdating || session.state.cluesRequestedBy?.includes(username)) return; const s = JSON.parse(JSON.stringify(session.state)); if (!s.cluesRequestedBy) s.cluesRequestedBy = []; s.cluesRequestedBy.push(username); if (!s.clueStack) s.clueStack = []; s.clueStack.push({ type: 'request', user: username }); await updateState(s); }
        async function sendClue() { const i = document.getElementById('clueInput'), c = i.value.trim(); if (!c || isUpdating) return; const s = JSON.parse(JSON.stringify(session.state)); if (!s.clueStack) s.clueStack = []; s.clueStack.push({ type: 'clue', text: c }); i.value = ''; await updateState(s); }
        async function perform(a, p) { 
            overlayTimeout = setTimeout(() => { document.getElementById('processingOverlay').style.display = 'flex'; }, 200);
            try { await fetch('/api/games/action', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ session_id: sessionId, username, action: a, params: p, version: session.version }) }); await fetchSession(true); }
            finally { clearTimeout(overlayTimeout); document.getElementById('processingOverlay').style.display = 'none'; setTimeout(() => isUpdating = false, 500); }
        }
        async function updateState(s, st = null) { isUpdating = true; try { await fetch('/api/games/update', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ session_id: sessionId, state: s, status: st || session.status }) }); await fetchSession(true); } finally { isUpdating = false; } }
        async function resetGame() { 
            isUpdating = true; 
            try { 
                await fetch('/api/games/update', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ 
                        session_id: sessionId, 
                        state: { restarting: true, updatedAt: Date.now() }, 
                        status: 'pending', 
                        new_host: username 
                    }) 
                }); 
                document.getElementById('secretWordInput').value = ''; 
                await fetchSession(true); 
            } finally { isUpdating = false; } 
        }
        async function leaveGame() { if (confirm("Leave?")) { await fetch('/api/games/leave', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ session_id: sessionId, username }) }); location.href = 'games.html'; } }
        async function removePlayer(targetUser) {
            if (!confirm(`Remove ${targetUser} from the game?`)) return;
            try {
                await fetch('/api/games/leave', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ session_id: sessionId, username: targetUser })
                });
                await fetchSession(true);
            } catch (e) { console.error(e); }
        }
        function showGameOver() {
            const s = session.state, isW = s.word.split('').every(c => c === ' ' || s.guessedLetters.some(l => l.toUpperCase() === c.toUpperCase())), isH = session.host?.toLowerCase() === username.toLowerCase();
            const o = document.getElementById('gameOverlay'); o.style.display = 'flex';
            const title = document.getElementById('overlayTitle');
            const msg = document.getElementById('overlayMessage');
            const isMeWinner = s.winner && username && s.winner.toLowerCase() === username.toLowerCase();
            const canRestart = isW ? isMeWinner : isH;

            if (isW) { 
                // Word was guessed
                if (isMeWinner) {
                    title.textContent = "WORD GUESSED - YOU WIN!"; title.style.color = "#28a745"; 
                } else if (isH) {
                    title.textContent = "YOU LOSE!"; title.style.color = "#dc3545";
                } else {
                    title.textContent = "WORD GUESSED!"; title.style.color = "#28a745"; 
                }

                if ((isMeWinner || isH) && !confettiShown) {
                    // Confetti if I won OR if I'm the host celebrating their success (optional, but keep for winner)
                    if (isMeWinner) confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, zIndex: 1000 });
                    confettiShown = true;
                }
            } else { 
                // Players failed to guess
                title.textContent = isH ? "YOU WIN!" : "YOU LOSE!"; title.style.color = isH ? "#28a745" : "#dc3545"; 
                if (isH && !confettiShown) {
                    confetti({ particleCount: 100, spread: 50, origin: { y: 0.6 }, zIndex: 1000 });
                    confettiShown = true;
                }
            }
            
            let messageHtml = `The word was <strong>${s.word}</strong>.`;
            if (isW) messageHtml += `<br>Winner: <strong>${s.winner}</strong>`;
            
            if (!canRestart) {
                const nextHost = isW ? s.winner : session.host;
                messageHtml += `<br><br><span style="color:#1e3c72; font-weight:bold;">Please wait for the new host (${nextHost}) to restart the game...</span>`;
            } else {
                messageHtml += `<br><br><span style="color:#28a745; font-weight:bold;">The other players are waiting for you to start a new game!</span><br>`;
                messageHtml += `<button class="btn-action" style="background:#28a745; margin-top:15px;" onclick="resetGame()">🎮 Play Again</button>`;
            }
            
            msg.innerHTML = messageHtml;
            document.getElementById('playAgainBtn').style.display = 'none'; // Use the inline one
        }
        let isPeeking = false, turnTimer = null, lastTurnAt = 0;
        function showPeek() { isPeeking = true; renderActive(); } function hidePeek() { isPeeking = false; renderActive(); }
        let cachedUsers = null;
        async function loadInvites() {
            const list = document.getElementById('inviteUserList'); if (!list) return;
            
            if (!cachedUsers) {
                const res = await fetch('/api/users/all');
                const data = await res.json();
                if (data.success) cachedUsers = data.users;
            }

            if (cachedUsers) {
                const cur = session.players.map(p => p.username.toLowerCase());
                const ai = ['Bob', 'Tim'];
                list.innerHTML = cachedUsers.filter(u => u.username.toLowerCase() !== username.toLowerCase() && !cur.includes(u.username.toLowerCase())).map(u => {
                    const disp = u.username.length > 10 ? u.username.substring(0,10) + '...' : u.username;
                    const isAI = ai.includes(u.username);
                    const statusDot = `<span style="width:8px; height:8px; background:${u.is_online ? '#28a745' : '#ccc'}; border-radius:50%; display:inline-block; margin-right:5px;"></span>`;
                    return `<div class="user-card ${invites.has(u.username) ? 'selected' : ''}" onclick="toggleInvite(this, '${u.username}')">${statusDot}${disp}${isAI ? ' (ai)' : ''}</div>`;
                }).join('') || 'None';
            }
        }
        let invites = new Set();
        function toggleInvite(el, u) { if (invites.has(u)) { invites.delete(u); el.classList.remove('selected'); } else { invites.add(u); el.classList.add('selected'); } }
        async function sendInvites() { if (!invites.size) return; await fetch('/api/games/invite', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ host: username, game_type: 'Hangman', invitees: Array.from(invites), session_id: sessionId }) }); alert("Sent!"); invites.clear(); document.getElementById('inviteUserList').removeAttribute('data-loaded'); loadInvites(); }
        function handleInput(k) { if (isUpdating || session?.status !== 'active') return; const u = k.toUpperCase(), r = session.state?.allowNumbers ? /^[A-Z0-9]$/ : /^[A-Z]$/; if (r.test(u) && !session.state.guessedLetters.some(l => l.toUpperCase() === u)) makeGuess(u); }
        window.addEventListener('keydown', (e) => { if (e.target.tagName !== 'INPUT') handleInput(e.key); });
        document.getElementById('keyboard').addEventListener('click', (e) => { const k = e.target.getAttribute('data-key'); if (k) { e.preventDefault(); e.stopPropagation(); handleInput(k); } });
        init();
    </script>
</body>
