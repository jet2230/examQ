<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExamQ - AI Quiz Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 1.1em; }
        
        .navbar {
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
        }
        .nav-links a {
            text-decoration: none;
            color: #1e3c72;
            font-weight: 600;
            margin-left: 20px;
        }
        .content { padding: 40px; }

        .generator-card {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
            border: 2px dashed #1e3c72;
            max-width: 800px;
            margin: 0 auto 40px;
        }
        
        .form-group { margin-bottom: 20px; position: relative; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 1.1em;
            outline: none;
        }
        .form-group input:focus { border-color: #1e3c72; }

        .btn-generate {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-generate:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .btn-generate:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .loading-zone {
            display: none;
            text-align: center;
            padding: 30px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #1e3c72;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .quiz-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .quiz-card {
            background: white;
            border: 1px solid #eee;
            padding: 20px;
            border-radius: 15px;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .quiz-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .quiz-topic { font-weight: 800; color: #1e3c72; font-size: 1.2em; margin-bottom: 10px; }
        .quiz-meta { font-size: 0.85em; color: #888; margin-bottom: 15px; }
        .btn-take {
            background: #f1f3f5;
            color: #1e3c72;
            text-decoration: none;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: 700;
            transition: background 0.2s;
        }
        .btn-take:hover { background: #1e3c72; color: white; }

        .autocomplete-items {
            position: absolute;
            border: 1px solid #d4d4d4;
            border-bottom: none;
            border-top: none;
            z-index: 99;
            top: 100%;
            left: 0;
            right: 0;
            border-radius: 0 0 10px 10px;
            overflow: hidden;
        }
        .autocomplete-items div {
            padding: 10px;
            cursor: pointer;
            background-color: #fff; 
            border-bottom: 1px solid #d4d4d4; 
        }
        .autocomplete-items div:hover { background-color: #e9e9e9; }
    </style>
</head>
<body>
    <div class="container">
        <div class="navbar">
            <div style="font-weight: 800; color: #1e3c72; font-size: 1.2em;">🎓 ExamQ Generator</div>
            <div class="nav-links">
                <span id="welcomeUser" style="margin-right: 15px; font-weight: 600; color: #1e3c72;"></span>
                <a href="/admin_users.html" id="usersLink" class="admin-only" style="display:none; color:#d63384;">⚙️ Users</a>
                <a href="/admin_exams.html" id="adminLink" class="admin-only" style="display:none; color:#d63384;">⚙️ Exams</a>
                <a href="/exam_questions.html">📖 Library</a>
                <a href="/results">📊 Results</a>
                <a href="#" onclick="logout()">🚪 Logout</a>
            </div>
        </div>

        <div class="header">
            <h1>AI Quiz Generator</h1>
            <p>Enter any topic and let AI create a practice quiz for you instantly.</p>
        </div>

        <div class="content">
            <div class="generator-card">
                <div class="form-group">
                    <label>Quiz Topic</label>
                    <input type="text" id="topic" placeholder="e.g. IGCSE Biology Heart Structure" autocomplete="off">
                    <div id="autocomplete-list" class="autocomplete-items"></div>
                </div>
                <div class="form-group">
                    <label>Number of Questions</label>
                    <select id="num_questions">
                        <option value="5">5 Questions</option>
                        <option value="10" selected>10 Questions</option>
                        <option value="15">15 Questions</option>
                        <option value="20">20 Questions</option>
                    </select>
                </div>
                <button id="genBtn" class="btn-generate" onclick="generateQuiz()">🚀 Generate Practice Quiz</button>
                
                <div id="loading" class="loading-zone">
                    <div class="spinner"></div>
                    <h3 style="color: #1e3c72;">AI is crafting your quiz...</h3>
                    <p style="color: #666; margin-top: 10px;">This usually takes 30-60 seconds.</p>
                </div>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px;">
                <h2 style="color: #1e3c72;">Your Saved AI Quizzes</h2>
            </div>
            
            <div id="savedQuizzes" class="quiz-grid">
                <!-- Saved quizzes injected here -->
            </div>
        </div>
    </div>

    <script>
        const topics = [
            "Biology: Cell Structure", "Biology: Transport in Plants", "Biology: Human Nutrition",
            "English: Analysis of Poetry", "English: Creative Writing", "English: Comparative Analysis",
            "Maths: Quadratic Equations", "Maths: Trigonometry", "Maths: Probability",
            "Chemistry: Atomic Structure", "Chemistry: Organic Chemistry",
            "Physics: Forces and Motion", "Physics: Electricity"
        ];

        function logout() {
            localStorage.removeItem('quiz_username');
            localStorage.removeItem('quiz_admin_username');
            window.location.href = 'login.html';
        }

        async function init() {
            const username = localStorage.getItem('quiz_username') || localStorage.getItem('quiz_admin_username');
            const isAdmin = !!localStorage.getItem('quiz_admin_username');
            
            if (!username) { window.location.href = 'login.html'; return; }
            
            document.getElementById('welcomeUser').textContent = '👤 ' + username;
            if (isAdmin) {
                document.getElementById('adminLink').style.display = 'inline';
                document.getElementById('usersLink').style.display = 'inline';
            }

            loadSavedQuizzes();
            setupAutocomplete();
        }

        async function loadSavedQuizzes() {
            const u = localStorage.getItem('quiz_username') || localStorage.getItem('quiz_admin_username');
            const res = await fetch(`/api/my-quizzes?username=${u}`);
            const data = await res.json();
            const container = document.getElementById('savedQuizzes');
            container.innerHTML = '';
            
            if (data.quizzes.length === 0) {
                container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #999; padding: 40px;">No quizzes generated yet.</p>';
                return;
            }

            data.quizzes.forEach(q => {
                const card = document.createElement('div');
                card.className = 'quiz-card';
                const date = new Date(q.created_at).toLocaleDateString(undefined, { day: 'numeric', month: 'short', year: 'numeric' });
                card.innerHTML = `
                    <div>
                        <div class="quiz-topic">${q.topic}</div>
                        <div class="quiz-meta">📅 Created: ${date}</div>
                    </div>
                    <a href="/quiz_${q.id}.html" class="btn-take">Take Quiz →</a>
                `;
                container.appendChild(card);
            });
        }

        async function generateQuiz() {
            const topic = document.getElementById('topic').value;
            const num = document.getElementById('num_questions').value;
            const u = localStorage.getItem('quiz_username') || localStorage.getItem('quiz_admin_username');
            
            if (!topic) { alert("Please enter a topic"); return; }

            document.getElementById('genBtn').disabled = true;
            document.getElementById('loading').style.display = 'block';

            try {
                const res = await fetch('/api/generate-quiz', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ topic, num_questions: num, username: u })
                });
                const data = await res.json();
                if (data.success) {
                    window.location.href = `/quiz_${data.quiz_id}.html`;
                } else {
                    alert("Generation failed: " + data.error);
                }
            } catch (e) {
                alert("Server error");
            } finally {
                document.getElementById('genBtn').disabled = false;
                document.getElementById('loading').style.display = 'none';
            }
        }

        function setupAutocomplete() {
            const input = document.getElementById('topic');
            const list = document.getElementById('autocomplete-list');
            
            input.oninput = function() {
                const val = this.value;
                list.innerHTML = '';
                if (!val) return;
                const matches = topics.filter(t => t.toLowerCase().includes(val.toLowerCase()));
                matches.forEach(m => {
                    const div = document.createElement('div');
                    div.textContent = m;
                    div.onclick = () => { input.value = m; list.innerHTML = ''; };
                    list.appendChild(div);
                });
            };
            document.addEventListener('click', (e) => { if (e.target !== input) list.innerHTML = ''; });
        }

        init();
    </script>
</body>
</html>
